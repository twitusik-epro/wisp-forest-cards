// ── PIORUN PRZECIWNIKA — czerwona plazma z góry w dół ──
function fireEnemyLightning(fromEnemyIdx, toPlayerIdx) {
  const canvas = document.getElementById('lightningCanvas');
  if(!canvas) return;
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  const fromEl = document.querySelector(`#enemyField .card[data-idx="${fromEnemyIdx}"]`);
  const toEl   = document.querySelector(`#handArea .card[data-idx="${toPlayerIdx}"]`);
  if(!fromEl || !toEl) return;

  // Zatrzymaj WSZYSTKIE animacje na czas pomiaru
  const allCards = document.querySelectorAll('#enemyField .card, #handArea .card');
  const savedAnims = [];
  allCards.forEach(c => { savedAnims.push(c.style.animation); c.style.animation = 'none'; });
  // Force pełny reflow — czekamy na stabilny layout
  document.body.offsetHeight;

  function center(el) {
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width/2, y: r.top + r.height/2 };
  }

  const from = center(fromEl);
  const to   = center(toEl);

  // Przywróć animacje
  allCards.forEach((c, i) => { c.style.animation = savedAnims[i]; });

  let frame = 0;
  const totalFrames = 60;
  // Kolory plazmy wroga — czerwień/purpura
  const coreColor   = '#ff2040';
  const glowColor   = '#cc0030';
  const outerColor  = '#880020';

  function plasma(x1,y1,x2,y2,chaos) {
    // Zygzak jak wąż — faluje bardziej niż piorun gracza
    const segs = 12;
    const pts = [[x1,y1]];
    for(let i=1;i<segs;i++){
      const t=i/segs;
      // Falisty wzór — sinusoidalny chaos
      const perp = { x: -(y2-y1), y: (x2-x1) };
      const plen = Math.sqrt(perp.x**2+perp.y**2)||1;
      const wave = Math.sin(t*Math.PI*3+frame*0.4)*chaos;
      pts.push([
        x1+(x2-x1)*t + (perp.x/plen)*wave + (Math.random()-.5)*chaos*0.4,
        y1+(y2-y1)*t + (perp.y/plen)*wave + (Math.random()-.5)*chaos*0.4,
      ]);
    }
    pts.push([x2,y2]);
    return pts;
  }

  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const p = frame/totalFrames;
    const alpha = p < 0.3 ? p/0.3 : 1-(p-0.3)/0.7;

    ctx.globalAlpha = alpha;

    // Poświata źródła (karta wroga)
    if(frame < 10) {
      const pulse = 1-frame/10;
      ctx.beginPath();
      ctx.arc(from.x, from.y, 20*pulse, 0, Math.PI*2);
      ctx.fillStyle = '#ff000033';
      ctx.fill();
    }

    // 3 warstwy plazmy — grubsza i bardziej falista niż piorun gracza
    [[30, outerColor, 4], [18, glowColor, 2.5], [8, coreColor, 1.5]].forEach(([chaos, color, lw]) => {
      const pts = plasma(from.x,from.y,to.x,to.y,chaos);
      ctx.beginPath();
      ctx.moveTo(pts[0][0],pts[0][1]);
      pts.forEach(([x,y])=>ctx.lineTo(x,y));
      ctx.strokeStyle = color;
      ctx.lineWidth = lw;
      ctx.shadowColor = coreColor;
      ctx.shadowBlur = 20;
      ctx.stroke();
    });

    // Biały rdzeń — bardzo cienki
    const corePts = plasma(from.x,from.y,to.x,to.y,5);
    ctx.beginPath();
    ctx.moveTo(corePts[0][0],corePts[0][1]);
    corePts.forEach(([x,y])=>ctx.lineTo(x,y));
    ctx.strokeStyle = '#ffffff88';
    ctx.lineWidth = 0.8;
    ctx.shadowBlur = 0;
    ctx.stroke();

    // Uderzenie — rozbłysk przy karcie gracza
    if(frame >= 35) {
      const exp = (frame-35)/25;
      // Krwawy krąg
      ctx.shadowBlur=25; ctx.shadowColor=coreColor;
      ctx.beginPath();
      ctx.arc(to.x, to.y, exp*24, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,0,40,${0.35*(1-exp)})`;
      ctx.fill();
      // Szprychy
      const spokes = 8;
      for(let s=0;s<spokes;s++){
        const ang = (s/spokes)*Math.PI*2 + frame*0.1;
        ctx.beginPath();
        ctx.moveTo(to.x,to.y);
        ctx.lineTo(to.x+Math.cos(ang)*exp*30, to.y+Math.sin(ang)*exp*30);
        ctx.strokeStyle=coreColor; ctx.lineWidth=1.5; ctx.stroke();
      }
      ctx.shadowBlur=0;
    }

    ctx.globalAlpha=1; ctx.shadowBlur=0;
    frame++;
    if(frame<totalFrames) requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  animate();
}

function getRandomCard(minRarity='common') {
  const weights = {common:50, rare:30, epic:15, legendary:4, mythic:1};
  const rarityOrder = ['common','rare','epic','legendary','mythic'];
  const minIdx = rarityOrder.indexOf(minRarity);
  const pool = CARD_DB.filter(c => rarityOrder.indexOf(c.rarity) >= minIdx);
  const totalWeight = pool.reduce((s,c) => s + weights[c.rarity], 0);
  let r = Math.random() * totalWeight;
  for(const card of pool) {
    r -= weights[card.rarity];
    if(r <= 0) return card;
  }
  return pool[pool.length-1];
}

function buyCard(cardId, price) {
  if((GS.mushrooms || 0) < price) {
    showToast(FCLANG.notEnough||'🍄 Not enough!');

  const card = CARD_DB.find(c => c.id === cardId);

  else GS.collection.push({id: cardId, count: 1});
  saveSave();
  updateMushroomDisplay();
  renderShop();
  showToast(FCLANG.bought(card.emoji,(FCLANG.cardNames||{})[card.id]||card.name));

function buyMushrooms(amount, price) {
  const token = getToken();
  if(!token){
    showToast(FCLANG.loginRequired||'🔑 Sign in to buy!');
    hideTopup();
    setTimeout(updateAuthUI, 100);
    return;
  }

  // Mapowanie ilości na package_id
  const pkgMap = { 10:'fc_pack_10', 25:'fc_pack_25', 50:'fc_pack_50' };
  const package_id = pkgMap[amount];
  if(!package_id){ showToast(FCLANG.unknownPkg||'Unknown package.'); return; }

  // Google Play Billing (TWA)
  const IS_TWA = document.referrer.includes('android-app://') || navigator.userAgent.includes('wv');
  if(IS_TWA && 'getDigitalGoodsService' in window){
    (async () => {
      try {
        const service = await window.getDigitalGoodsService('https://play.google.com/billing');
        const details = await service.getDetails([package_id]);
        if(!details || !details.length){ _buyWithPaddle(package_id, token); return; }
        const request = new PaymentRequest(
          [{ supportedMethods:'https://play.google.com/billing', data:{ sku: package_id } }],
          { total:{ label: details[0].title || package_id, amount:{ currency:'EUR', value:'0' } } }
        );
        const response = await request.show();
        const r = await fetch('/api/gplay/verify', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ package_id, purchase_token: response.details.token }),
        });
        const data = await r.json();
        if(data.ok){
          await response.complete('success');
          GS.mushrooms = data.mushrooms;
          saveSave();
          updateMushroomDisplay();
          hideTopup();
          renderShop();
          showToast(`🍄 +${amount} ${FCLANG.shopMush?'':' mushrooms'} ✅`);
        } else {
          await response.complete('fail');
        }
      } catch(e) {
        if(e.name !== 'AbortError') _buyWithPaddle(package_id, token);
      }
    })();
    return;
  }

  // Paddle (web)
  _buyWithPaddle(package_id, token);

  function _buyWithPaddle(pkg, tok){
    fetch('/api/buy', {
      method: 'POST',
      headers: { Authorization:'Bearer '+tok, 'Content-Type':'application/json' },
      body: JSON.stringify({ package_id: pkg }),
    })
    .then(r => r.json())
    .then(d => {
      if(!d.price_id || !window.Paddle){ showToast(FCLANG.payError||'Payment error'); return; }
      Paddle.Checkout.open({
        items: [{ priceId: d.price_id, quantity: 1 }],
        customData: { user_id: String(d.user_id), package_id: d.package_id },
        settings: { successUrl: window.location.origin + '/?purchase=success' },
      });
    })
    .catch(() => showToast(FCLANG.connError||'Connection error'));
  }
}

// ── TOAST ─────────────────────────────────────────
function showToast(msg, duration=2800) {
  let toast = document.getElementById('fc-toast');
  if(!toast) {
    toast = document.createElement('div');
    toast.id = 'fc-toast';
    toast.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:rgba(20,40,20,.95);border:1px solid #3a8a3a;border-radius:20px;
      padding:10px 22px;font-family:'Cinzel',cursive;font-size:13px;color:#b8ffa0;
      z-index:9999;pointer-events:none;white-space:nowrap;
      animation:toastIn .25s ease;box-shadow:0 4px 20px rgba(0,0,0,.5);`;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.display = 'block';
  toast.style.opacity = '1';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => {
    toast.style.transition = 'opacity .4s';
    toast.style.opacity = '0';
    setTimeout(() => { toast.style.display = 'none'; toast.style.transition = ''; }, 400);
  }, duration);
}

// ── MENU PARTICLES ────────────────────────────────
function initMenuParticles() {
  const canvas = document.getElementById('menuCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    const menu = document.getElementById('menu');
    canvas.width  = menu.offsetWidth  || window.innerWidth;
    canvas.height = menu.offsetHeight || window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const particles = Array.from({length:50}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2.5 + 0.5,
    vy: -(Math.random() * 0.6 + 0.15),
    vx: (Math.random() - 0.5) * 0.2,
    alpha: Math.random() * 0.5 + 0.15,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.y += p.vy;
      p.x += p.vx;
      if(p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
      if(p.x < -10) p.x = canvas.width + 10;
      if(p.x > canvas.width + 10) p.x = -10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(128,238,96,${p.alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ── UI HELPERS ────────────────────────────────────
function showScreen(name) {
  try { Audio.init(); Audio.sfxMenuClick(); } catch(e){}
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if(name === 'collection') renderCollection();
  if(name === 'deckbuilder') renderDeckBuilder();
  if(name === 'menu') { updateMenuLives(); try{ Audio.playTheme(0); }catch(e){} }
  if(name === 'shop') { renderShop(); try{ Audio.playTheme(2); }catch(e){} }
  if(name === 'ranking') renderRanking();
}

// ═══════════════════════════════════════════════
//  AKTYWNY TIMER — darmowe życie co 30 min gry
// ═══════════════════════════════════════════════
const FREE_LIFE_SECONDS = 30 * 60; // 30 minut aktywnej gry
let _activeTimer = null;
let _activeSeconds = 0;
let _pageVisible = true;

function startActiveTimer() {
  if(_activeTimer) return;
  _activeSeconds = parseInt(localStorage.getItem('fc_activeSeconds') || '0');
  _activeTimer = setInterval(() => {
    if(!_pageVisible) return; // Nie liczy gdy karta przeglądarki niewidoczna
    // Nie liczy gdy pauza lub nie-battle screen
    const battleActive = document.getElementById('battle')?.classList.contains('active');
    const pauseOpen = document.getElementById('pause-overlay')?.style.display !== 'none';
    if(!battleActive || pauseOpen) return;

    _activeSeconds++;
    localStorage.setItem('fc_activeSeconds', _activeSeconds);

    if(_activeSeconds >= FREE_LIFE_SECONDS) {
      _activeSeconds = 0;
      localStorage.setItem('fc_activeSeconds', '0');
      if(GS.lives < 10) {
        GS.lives++;
        saveSave();
        updateMenuLives();
        showFreeLifeToast();
      }
    }
  }, 1000);
}

function showFreeLifeToast() {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);
    background:linear-gradient(135deg,#1a4a1a,#2a8a2a);border:2px solid #4aaa3a;
    color:#b8ffa0;font-family:'Cinzel',cursive;font-size:14px;padding:12px 24px;
    border-radius:30px;z-index:999;box-shadow:0 0 20px rgba(60,200,40,.4);
    animation:toastIn .3s ease;`;
  t.textContent = FCLANG.freeLife||'🎁 Free life! +1 ❤️';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

// Wykryj czy karta jest widoczna
document.addEventListener('visibilitychange', () => {
  _pageVisible = !document.hidden;
});

// Ile czasu do następnego życia (w sekundach)
function getSecondsToNextLife() {
  return FREE_LIFE_SECONDS - _activeSeconds;
}

// ═══════════════════════════════════════════════
//  PAUZA
// ═══════════════════════════════════════════════
let _paused = false;

function openPause() {
  _paused = true;
  const overlay = document.getElementById('pause-overlay');
  overlay.style.display = 'flex';
  // Pokaż info o życiach
  const secs = getSecondsToNextLife();
  const mins = Math.floor(secs/60);
  const s = secs%60;
  const info = document.getElementById('pauseLivesInfo');
  if(info) {
    if(GS.lives >= 10) {
      info.textContent = FCLANG.maxLives||'Max lives (10)';
    } else {
      info.textContent = FCLANG.nextLife(mins,s);
    }
  }
}

function closePause() {
  _paused = false;
  const overlay = document.getElementById('pause-overlay');
  overlay.style.display = 'none';
}

// ═══════════════════════════════════════════════
//  RANKING
// ═══════════════════════════════════════════════
// Boty do rankingu
function getPlayerScore() {
  return (GS.wins||0) * 200 + (GS.battleLevel||1) * 50;
}

async function renderRanking() {
  const list = document.getElementById('rankingList');
  if(!list) return;
  list.innerHTML = `<div style="text-align:center;color:#5a7a5a;padding:20px;font-style:italic;">${FCLANG.rankLoading||'Loading...'}</div>`;

  const medals = ['🥇','🥈','🥉'];
  const myNick = getUser()?.nick || null;
  const myScore = getPlayerScore();

  let entries = [];
  try {
    entries = await fetch('/api/leaderboard').then(r => r.json());
  } catch(e) {
    list.innerHTML = `<div style="text-align:center;color:#7a4a4a;padding:20px;font-style:italic;">${FCLANG.rankNoConn||'No connection.'}</div>`;
    return;
  }

  // Dodaj lokalnego gracza jeśli go nie ma w rankingu
  const myEntry = { name: FCLANG.rankYou||'⭐ You', wins: GS.wins||0, score: myScore, isPlayer:true };
  const alreadyIn = myNick && entries.some(e => e.nick === myNick);
  if(!alreadyIn) entries = [...entries, myEntry].sort((a,b) => b.score - a.score);

  list.innerHTML = '';
  entries.slice(0, 20).forEach((entry, i) => {
    const isMe = entry.isPlayer || (myNick && entry.nick === myNick);
    const name = entry.isPlayer ? (FCLANG.rankYou||'⭐ You') : (entry.nick || 'Guest');
    const avatar = entry.avatar_url
      ? `<img src="${entry.avatar_url}" style="width:28px;height:28px;border-radius:50%;flex-shrink:0;">`
      : `<div style="width:28px;height:28px;border-radius:50%;background:rgba(40,80,40,.6);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">🌿</div>`;

    const row = document.createElement('div');
    row.className = 'rank-row';
    if(isMe) row.style.cssText += ';border-color:rgba(128,238,96,.5);background:rgba(10,40,10,.9);';
    const num = medals[i] || `#${i+1}`;
    row.innerHTML = `
      <div class="rank-num">${num}</div>
      ${avatar}
      <div style="flex:1;min-width:0;">
        <div class="rank-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</div>
        <div class="rank-wins">${FCLANG.rankWins(entry.wins||0)}</div>
      </div>
      <div class="rank-score">${FCLANG.rankPts(entry.score||0)}</div>
    `;
    list.appendChild(row);
  });

  if(!entries.length){
    list.innerHTML = `<div style="text-align:center;color:#5a7a5a;padding:20px;font-style:italic;">${FCLANG.rankEmpty||'Be the first!'}</div>`;
  }
}

function updateMenuLives() {
  const el = document.getElementById('menuLives');
  if(!el) return;
  el.innerHTML = '';
  // Jak w Wisp: ❤️ ×91  (jedno serduszko + liczba)
  const heart = document.createElement('span');
  heart.textContent = '❤️';
  heart.style.fontSize = '16px';
  el.appendChild(heart);
  if(GS.lives !== 1) {
    const x = document.createElement('span');
    x.style.cssText = 'color:#ff8080;font-family:Cinzel,serif;font-size:13px;margin-left:2px;margin-right:8px;';
    x.textContent = `×${GS.lives}`;
    el.appendChild(x);
  } else {
    el.appendChild(document.createTextNode(' '));
  }
  const lbl = document.createElement('span');
  lbl.textContent = FCLANG.livesInfo(GS.lives,GS.battleLevel,FC_DIFF_CONFIG[FC_DIFF]?.label||'');
  el.appendChild(lbl);
  updateMenuContinue();
}

function shuffle(arr) {
  for(let i=arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

let _adminClicks = 0;
function adminAddLives() {
  _adminClicks++;
  if(_adminClicks >= 3) {
    _adminClicks = 0;
    GS.lives += 100;
    // Odblokuj wszystkie karty
    ['wisp','oak','fairy','fog','heart','wolf','mushroom','river','night','frost',
     'seed','storm','bear','firefly','crow','thorn','moonspirit','lava'].forEach(id => {
      const ex = GS.collection.find(c=>c.id===id);
      if(ex) ex.count = Math.max(ex.count, 3);
      else GS.collection.push({id, count:3});
      if(!GS.deck.includes(id)) GS.deck.push(id);
    });
    saveSave();
    updateMenuLives();
    document.getElementById('adminBtn').textContent = '✅ +100 żyć!';
    setTimeout(()=>{ document.getElementById('adminBtn').textContent = 'v10'; }, 2000);
  } else {
    document.getElementById('adminBtn').textContent = `v10 (${_adminClicks}/3)`;
    setTimeout(()=>{ _adminClicks=0; document.getElementById('adminBtn').textContent='v10'; }, 1500);
  }
}
window.adminAddLives = adminAddLives;
function toggleMute() {
  _muted = !_muted;
  Audio.setMute(_muted);
  const btn = document.getElementById('muteBtn');
  if(btn) btn.textContent = _muted ? '🔇' : '🔊';
}

// ── INIT ──────────────────────────────────────────
window.addEventListener('load', async () => {
  // Wyczyść stary zapis jeśli pochodzi z poprzedniej wersji
  try {
    const old = localStorage.getItem('fc_save');
    if(old) {
      const p = JSON.parse(old);
      if(p.wins === undefined) { localStorage.removeItem('fc_save'); }
    }
  } catch(e) { try{ localStorage.removeItem('fc_save'); }catch(e2){} }

  initGame();
  applyFCLang();
  setTimeout(initMenuParticles, 50);
  startActiveTimer();

  // ── Obsługa URL params po OAuth / zakupie ────────
  const params = new URLSearchParams(window.location.search);

  // Token po logowaniu Google
  const urlToken = params.get('token');
  if(urlToken){
    setToken(urlToken);
    history.replaceState({}, '', window.location.pathname);
  }

  // Komunikat po udanym zakupie Paddle
  const purchase = params.get('purchase');
  if(purchase === 'success'){
    history.replaceState({}, '', window.location.pathname);
    setTimeout(async () => {
      if(getToken()){
        try {
          const sv = await apiGet('/api/progress');
          if(sv.mushrooms !== undefined){
            GS.mushrooms = sv.mushrooms;
            saveSave();
            updateMushroomDisplay();
          }
        } catch(e){}
      }
      showToast(FCLANG.purchaseOk||'✅ Purchase complete!');
    }, 3000);
  }

  // ── Sync z serwerem jeśli zalogowany ────────────
  if(getToken()){
    const user = await syncMe();
    if(user){
      await syncProgressFromServer();
      updateMushroomDisplay();
      updateMenuContinue();
    } else {
      clearAuth(); // token wygasł
    }
  }

  updateAuthUI();

  // Rejestracja Service Worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  }

  // Próba auto-startu muzyki — działa na wielu przeglądarkach
  (async () => {
    try {
      Audio.init();
      // Niektóre przeglądarki pozwalają na autoplay po krótkiej chwili
      await new Promise(r => setTimeout(r, 300));
      Audio.playTheme(0);
    } catch(e) {}
  })();

  // Fallback — przy pierwszym dotyku/kliknięciu na pewno startuje
  function ensureMusic() {
    try { Audio.init(); Audio.playTheme(0); } catch(e){}
    document.removeEventListener('click', ensureMusic);
    document.removeEventListener('touchstart', ensureMusic);
  }
  document.addEventListener('click', ensureMusic);
  document.addEventListener('touchstart', ensureMusic, {passive:true});

  // Ukryty skrót klawiszowy — N = następna plansza (tylko PC, tylko podczas walki)
  document.addEventListener('keydown', (e) => {
    if(e.key === 'n' || e.key === 'N') {
      const battleActive = document.getElementById('battle')?.classList.contains('active');
      if(!battleActive || battle.over) return;
      battle.over = true;
      GS.wins++;
      GS.battleLevel = Math.min(GS.battleLevel + 1, ENEMIES.length + 1);
      saveSave();
      showPrebattle();
    }
  });
});
