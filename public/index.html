<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌿 Forest Cards</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a3a1a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<!-- Paddle.js -->
<meta name="paddle-env" content="production">
<meta name="paddle-token" content="live_2379064e4093798aaef64cc9d4f">
<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
<style>
:root {
  --bg: #060e06;
  --bg2: #0c180c;
  --bg3: #111f11;
  --green: #80ee60;
  --green2: #4a9a2a;
  --gold: #ffd060;
  --red: #ff6060;
  --blue: #60c0ff;
  --purple: #df80ff;
  --fire: #ff9040;
  --shadow: rgba(0,0,0,0.7);
  --c-common: #888;
  --c-rare: #40aa40;
  --c-epic: #6060ff;
  --c-legendary: #cc80ff;
  --c-mythic: #ffaa00;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg); font-family:'Crimson Pro',serif; color:#fff; touch-action:none; }

/* ── SCREENS ── */
#app { width:100%; height:100%; position:relative; display:flex; flex-direction:column; align-items:center; max-width:480px; margin:0 auto; }
.screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; overflow:hidden; }
.screen.active { display:flex; }

/* ── MENU ── */
#menu { background: radial-gradient(ellipse at 50% 30%, #1a3a0a 0%, #060e06 70%); justify-content:center; padding:0 20px; overflow-y:auto; }
.menu-particles { position:absolute; inset:0; pointer-events:none; width:100%; height:100%; }
@keyframes floatWisp { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

/* Wisp brand ponad tytułem */
.menu-wisp-brand { display:flex; align-items:center; gap:8px; margin-bottom:4px; position:relative; z-index:1; }
.menu-wisp-logo { flex-shrink:0; filter:drop-shadow(0 0 8px rgba(80,220,40,.5)); animation:floatWisp 3s ease-in-out infinite; }
.menu-wisp-name { font-family:'Cinzel',cursive; font-size:16px; color:#80ee60; letter-spacing:2px; opacity:.8; }
/* Logo */
.menu-logo-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; position:relative; z-index:1; }
.menu-title-text { font-family:'Cinzel',cursive; font-size:36px; font-weight:700; color:var(--green); text-shadow:0 0 30px rgba(80,220,40,.6); letter-spacing:2px; }
.menu-subtitle { font-style:italic; font-size:14px; color:#5a8a5a; margin-bottom:12px; text-align:center; line-height:1.5; position:relative; z-index:1; }
.menu-choosediff { font-family:'Cinzel',cursive; font-size:12px; color:#5a8a5a; margin-bottom:8px; letter-spacing:1px; position:relative; z-index:1; }

/* Przyciski trudności — identyczne jak w Wisp */
.diff-row { display:flex; gap:8px; margin-bottom:14px; width:100%; position:relative; z-index:1; }
.diff-btn { flex:1; padding:10px 6px; border-radius:14px; border:2px solid transparent; font-family:'Cinzel',cursive; font-size:12px; cursor:pointer; transition:all .2s; text-align:center; line-height:1.5; }
.diff-btn .diff-icon { font-size:22px; display:block; margin-bottom:3px; }
.diff-btn .diff-lives { font-size:10px; font-style:italic; opacity:.8; display:block; margin-top:2px; font-family:'Crimson Pro',serif; }
.diff-btn.easy { background:rgba(20,60,20,.8); border-color:#4a8a3a; color:#a0e080; }
.diff-btn.easy:hover, .diff-btn.easy.selected { background:rgba(40,100,30,.9); border-color:#80cc50; box-shadow:0 0 14px rgba(80,200,50,.4); }
.diff-btn.medium { background:rgba(50,40,10,.8); border-color:#8a6a20; color:#e0b060; }
.diff-btn.medium:hover, .diff-btn.medium.selected { background:rgba(90,65,10,.9); border-color:#ccaa30; box-shadow:0 0 14px rgba(200,160,40,.4); }
.diff-btn.hard { background:rgba(60,10,10,.8); border-color:#8a2020; color:#e08080; }
.diff-btn.hard:hover, .diff-btn.hard.selected { background:rgba(100,15,15,.9); border-color:#cc3030; box-shadow:0 0 14px rgba(220,50,50,.4); }
.diff-btn.selected { transform:scale(1.05); }

/* Przyciski główne */
.btn { display:block; text-align:center; cursor:pointer; border-radius:12px; font-family:'Cinzel',cursive; letter-spacing:1px; transition:all .2s; border:none; }
.btn-green { background:linear-gradient(135deg,#1e5a1e,#2d8a2d); color:#b8ffa0; border:1px solid #4a9a3a; box-shadow:0 0 16px rgba(60,180,40,.3); padding:13px 0; width:100%; font-size:16px; margin-bottom:6px; position:relative; z-index:1; }
.btn-green:hover { transform:scale(1.02); box-shadow:0 0 24px rgba(60,180,40,.5); }
.btn-gold { background:linear-gradient(135deg,#4a3000,#7a5000); color:#ffe090; border:1px solid #aa7a20; padding:11px 0; width:100%; font-size:13px; margin-bottom:6px; position:relative; z-index:1; }
.btn-gold:hover { transform:scale(1.02); }
.fc-play-btn, .fc-continue-btn { width:100%; }

/* Pasek ikon — mały rząd jak w Wisp */
.menu-icon-row { display:flex; gap:5px; margin-top:8px; justify-content:center; flex-wrap:wrap; position:relative; z-index:1; }
.menu-icon-btn { background:rgba(20,40,20,.7); color:#80c070; border:1px solid #2a6a2a; border-radius:8px; padding:5px 8px; font-size:11px; cursor:pointer; font-family:'Crimson Pro',serif; transition:all .15s; }
.menu-icon-btn:hover { background:rgba(30,60,30,.9); }

/* Info i footer */
.menu-lives { display:flex; align-items:center; gap:6px; margin-top:10px; font-size:12px; color:#5a8a5a; position:relative; z-index:1; flex-wrap:wrap; justify-content:center; }
.menu-controls { font-size:10px; color:#2a5a2a; margin-top:6px; position:relative; z-index:1; }
.menu-footer { margin-top:8px; font-size:10px; color:#2a4a2a; position:relative; z-index:1; }
.menu-footer a { color:#2a5a2a; text-decoration:none; }
.menu-footer a:hover { color:#4a8a4a; }

/* Stare klasy zachowane dla kompatybilności */
.menu-title { font-family:'Cinzel',cursive; font-size:36px; font-weight:700; color:var(--green); }
.menu-sub { font-style:italic; font-size:14px; color:#5a8a5a; }
.menu-wisp { font-size:38px; animation:floatWisp 3s ease-in-out infinite; }
.menu-btn { width:100%; padding:12px 0; border-radius:12px; font-family:'Cinzel',cursive; font-size:13px; cursor:pointer; border:none; margin:4px 0; letter-spacing:1px; transition:all .2s; }
.btn-play { background:linear-gradient(135deg,#1e5a1e,#2d8a2d); color:#b8ffa0; border:1px solid #4a9a3a; }
.btn-coll { background:rgba(20,40,20,.8); color:#7aaa6a; border:1px solid #2a5a2a; }
.btn-shop { background:linear-gradient(135deg,#5a3a00,#8a5a00); color:#ffe080; border:1px solid #aa8020; }

/* ── CANVAS rysowania kart ── */
.card-canvas { border-radius:12px; display:block; }

/* ── BATTLE SCREEN ── */
#battle { background:#040a04; }
.battle-bg { position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%, #0a2a0a 0%, #040a04 60%); }
.battle-ui { position:relative; width:100%; height:100%; display:flex; flex-direction:column; }

/* ── Vitality / Life bars ── */
.hp-bar-wrap { padding:5px 10px 4px; display:flex; align-items:center; gap:8px; flex-shrink:0; }
.hp-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; border:2px solid; flex-shrink:0; }
.hp-info { flex:1; }
.hp-name { font-family:'Cinzel',cursive; font-size:13px; letter-spacing:1px; }
.hp-bar-bg { height:8px; background:rgba(255,255,255,.1); border-radius:4px; margin-top:4px; overflow:hidden; }
.hp-bar-fill { height:100%; border-radius:4px; transition:width .5s ease; }
.hp-enemy .hp-avatar { border-color:#ff6060; background:rgba(80,10,10,.5); }
.hp-enemy .hp-bar-fill { background:linear-gradient(90deg,#cc2020,#ff4040); }
.hp-player .hp-avatar { border-color:var(--green); background:rgba(10,40,10,.5); }
.hp-player .hp-bar-fill { background:linear-gradient(90deg,#2aaa20,#60ee40); }

.field-enemy { display:flex; gap:6px; justify-content:center; width:100%; padding:0 10px; box-sizing:border-box; }
.field-player { display:flex; gap:6px; }
.battle-log { font-style:italic; font-size:clamp(13px,4.5vw,22px); color:#8acc7a; text-align:center; padding:4px 16px; line-height:1.3; min-height:2.6em; display:flex; flex-direction:column; justify-content:center; }
.section-label { font-size:clamp(10px,3vw,15px); color:#5a8a5a; letter-spacing:1px; text-align:center; font-family:'Cinzel',cursive; }
.lives-bar { padding:4px 14px 4px; display:flex; align-items:center; gap:4px; flex-shrink:0; }
.life-heart { font-size:16px; }

/* Battle field — bez pustki, justify-content: stretch */
.battle-field { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:space-around; position:relative; min-height:0; padding:2px 0; }

/* ── CARD COMPONENT ── */
.card { border-radius:8px; cursor:pointer; position:relative; transition:transform .2s, box-shadow .2s; flex-shrink:0; }
.hand-area { padding:4px 10px 8px; display:flex; gap:6px; justify-content:center; flex-shrink:0; flex-wrap:nowrap; width:100%; box-sizing:border-box; }
.card:hover { transform:translateY(-6px); }
.card.selected { transform:translateY(-12px); box-shadow:0 0 20px rgba(128,238,96,.7); }
.card.attacking { animation:cardAttack .4s ease; }
.card.shake { animation:cardShake .3s ease; }
.card.enemy-card { cursor:default; }
.card.enemy-card:hover { transform:none; }
@keyframes cardAttack { 0%{transform:translateY(-12px)} 40%{transform:translateY(-50px) scale(1.1)} 100%{transform:translateY(-12px)} }
@keyframes cardShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
@keyframes cardRecoil { 0%{transform:translateY(0)} 35%{transform:translateY(14px) scale(.96)} 65%{transform:translateY(-4px)} 100%{transform:translateY(0)} }
@keyframes cardDie { 0%{opacity:1;transform:scale(1) rotate(0deg)} 40%{opacity:.6;transform:scale(1.05) rotate(-4deg)} 100%{opacity:0;transform:scale(.4) rotate(12deg) translateY(30px)} }
@keyframes cardHit { 0%,100%{filter:brightness(1)} 30%{filter:brightness(2) saturate(0)} }
@keyframes aimBounce { from{transform:translateX(-50%) translateY(0)} to{transform:translateX(-50%) translateY(-5px)} }
@keyframes enemyPulse { 0%,100%{box-shadow:0 0 8px rgba(255,80,80,.3)} 50%{box-shadow:0 0 20px rgba(255,80,80,.7)} }

/* Card rarity borders */
.card.common  { border:2px solid var(--c-common); }
.card.rare    { border:2px solid var(--c-rare); box-shadow:0 0 6px rgba(64,170,64,.3); }
.card.epic    { border:2px solid var(--c-epic); box-shadow:0 0 8px rgba(96,96,255,.4); }
.card.legendary { border:2px solid var(--c-legendary); box-shadow:0 0 12px rgba(204,128,255,.5); }
.card.mythic  { border:2px solid var(--c-mythic); box-shadow:0 0 14px rgba(255,170,0,.5); }

/* ── COLLECTION ── */
#collection { background:var(--bg); flex-direction:column; }
.coll-header { width:100%; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(80,160,40,.2); flex-shrink:0; }
.coll-title { font-family:'Cinzel',cursive; font-size:16px; color:var(--green); }
.back-btn { background:rgba(20,50,20,.8); border:1px solid #2a5a2a; color:#7aaa6a; padding:6px 14px; border-radius:20px; cursor:pointer; font-family:'Crimson Pro',serif; font-size:13px; }
.coll-grid { flex:1; overflow-y:auto; padding:12px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.coll-card-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; }
.coll-count { font-size:10px; color:#5a8a5a; font-style:italic; }

/* ── SHOP ── */
#shop { background:linear-gradient(160deg,#100800,#060e06); flex-direction:column; }
.shop-header { width:100%; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(180,120,0,.2); flex-shrink:0; }
.shop-title { font-family:'Cinzel',cursive; font-size:16px; color:var(--gold); }
.shop-packs { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; }
.pack-item { background:rgba(30,20,0,.8); border:1px solid rgba(150,100,0,.3); border-radius:14px; padding:16px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:all .2s; }
.pack-item:hover { border-color:var(--gold); transform:scale(1.02); }
.pack-icon { font-size:36px; flex-shrink:0; }
.pack-info { flex:1; }
.pack-name { font-family:'Cinzel',cursive; font-size:14px; color:var(--gold); }
.pack-desc { font-size:12px; color:#8a7a5a; margin-top:3px; font-style:italic; }
.pack-price { font-family:'Cinzel',cursive; font-size:16px; color:#ffe080; flex-shrink:0; }
.pack-guarantee { font-size:10px; color:#6a9a5a; margin-top:4px; }

/* ── PACK OPENING ── */
#pack-open { background:radial-gradient(ellipse at 50% 50%, #1a1000 0%, #060e06 70%); flex-direction:column; align-items:center; justify-content:center; }
.pack-open-title { font-family:'Cinzel',cursive; font-size:20px; color:var(--gold); margin-bottom:24px; }
.pack-cards-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; padding:10px; }
.pack-card-slot { opacity:0; transform:rotateY(180deg); transition:all .4s; }
.pack-card-slot.revealed { opacity:1; transform:rotateY(0deg); }
.pack-continue { margin-top:24px; padding:12px 36px; background:linear-gradient(135deg,#1e5a1e,#2d8a2d); color:#b8ffa0; border:1px solid #4a9a3a; border-radius:30px; font-family:'Cinzel',cursive; font-size:14px; cursor:pointer; }

/* ── RESULT OVERLAY ── */
#result-overlay { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,.92); z-index:60; }
#result-overlay.show { display:flex; }
.result-title { font-family:'Cinzel',cursive; font-size:32px; margin-bottom:10px; }
.result-sub { font-style:italic; font-size:15px; color:#7aaa6a; margin-bottom:20px; }
.result-score { font-family:'Cinzel',cursive; font-size:20px; color:var(--gold); margin-bottom:20px; }
.result-btn { padding:12px 32px; border-radius:30px; font-family:'Cinzel',cursive; font-size:14px; cursor:pointer; margin:6px; border:none; }
.btn-next { background:linear-gradient(135deg,#1e5a1e,#2d8a2d); color:#b8ffa0; border:1px solid #4a9a3a; }
.btn-menu { background:rgba(20,40,20,.8); color:#7aaa6a; border:1px solid #2a5a2a; }

/* ── DAMAGE FLOAT ── */
.dmg-float { position:absolute; font-family:'Cinzel',cursive; font-size:22px; font-weight:700; pointer-events:none; animation:floatDmg .8s ease forwards; z-index:100; }
@keyframes floatDmg { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.4)} }

/* ── TYPE BADGES ── */
.type-badge { font-size:8px; padding:2px 6px; border-radius:6px; font-family:'Cinzel',cursive; letter-spacing:.5px; }
.type-earth  { background:#1a3a0a; color:#80ff60; }
.type-water  { background:#0a1a3a; color:#60c0ff; }
.type-fire   { background:#3a1a0a; color:#ffa060; }
.type-wind   { background:#1a2a1a; color:#c0e060; }
.type-shadow { background:#0a0a2a; color:#c0c0ff; }
.type-magic  { background:#2a0a3a; color:#df80ff; }

/* ── LIVES DISPLAY ── */
.lives-bar { width:100%; padding:4px 16px 8px; display:flex; align-items:center; gap:4px; flex-shrink:0; }
.life-heart { font-size:14px; }
.life-heart.lost { opacity:.2; }
.lives-label { font-size:11px; color:#5a7a5a; margin-left:4px; font-style:italic; }

/* ── GUIDE ── */
.guide-section { background:rgba(10,25,10,.7); border:1px solid rgba(60,120,60,.3); border-radius:14px; padding:14px; }
.guide-h { font-family:'Cinzel',cursive; font-size:15px; color:#90e080; margin-bottom:10px; letter-spacing:.5px; }
.guide-text { font-family:'Crimson Pro',serif; font-size:14px; color:#7aaa6a; line-height:1.6; }
.guide-step { display:flex; gap:10px; align-items:flex-start; margin-bottom:8px; }
.guide-num { background:rgba(60,140,40,.3); border:1px solid #4a8a3a; color:#90e080; font-family:'Cinzel',cursive; font-size:12px; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
.guide-step span:last-child { font-family:'Crimson Pro',serif; font-size:14px; color:#7aaa6a; line-height:1.5; }
.guide-stat-row { display:flex; gap:12px; align-items:center; padding:6px 0; border-bottom:1px solid rgba(60,100,60,.2); font-size:14px; }
.guide-stat-row span:first-child { font-family:'Cinzel',cursive; font-size:13px; width:90px; flex-shrink:0; }
.guide-stat-row span:last-child { color:#6a9a6a; font-family:'Crimson Pro',serif; }
.type-adv-row { display:flex; align-items:center; gap:6px; padding:5px 0; }
.type-pill { font-size:11px; padding:3px 8px; border-radius:12px; font-family:'Cinzel',cursive; font-weight:500; }
.type-pill.water  { background:#0a1a3a; color:#60c0ff; border:1px solid #2060aa; }
.type-pill.fire   { background:#3a1a0a; color:#ffa060; border:1px solid #aa4010; }
.type-pill.wind   { background:#1a2a1a; color:#c0e060; border:1px solid #4a6a20; }
.type-pill.earth  { background:#0a1a0a; color:#80ff60; border:1px solid #2a6a20; }
.type-pill.shadow { background:#0a0a2a; color:#c0c0ff; border:1px solid #3030aa; }
.type-pill.magic  { background:#2a0a3a; color:#df80ff; border:1px solid #6020aa; }
.adv-arrow { font-size:12px; color:#aa7040; font-family:'Cinzel',cursive; flex-shrink:0; }
.guide-rarity-row { display:flex; gap:12px; align-items:center; padding:5px 0; border-bottom:1px solid rgba(60,100,60,.15); }
.guide-rarity-row span:first-child { font-family:'Cinzel',cursive; font-size:11px; width:110px; flex-shrink:0; }
.guide-rarity-row span:last-child { font-family:'Crimson Pro',serif; font-size:13px; color:#6a8a6a; }

@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(80,160,40,.3); border-radius:2px; }

/* ── PAUZA ── */
.pause-btn { width:220px; padding:14px 0; border-radius:20px; font-family:'Cinzel',cursive; font-size:14px; cursor:pointer; background:rgba(10,30,10,.9); border:1px solid #2a6a2a; color:#b8ffa0; letter-spacing:1px; transition:all .2s; }
.pause-btn:hover { transform:scale(1.04); background:rgba(20,50,20,.9); }

/* ── RANKING ── */
.rank-row { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; background:rgba(15,25,5,.8); border:1px solid rgba(80,140,20,.2); }
.rank-num { font-family:'Cinzel',cursive; font-size:18px; width:32px; text-align:center; flex-shrink:0; }
.rank-name { flex:1; font-family:'Cinzel',cursive; font-size:14px; color:#c0e0a0; }
.rank-score { font-family:'Cinzel',cursive; font-size:15px; color:#ffd060; }
.rank-wins { font-size:11px; color:#5a8a4a; font-family:'Crimson Pro',serif; font-style:italic; }
</style>
</head>
<body>
<div id="app">

  <!-- MENU -->
  <div id="menu" class="screen active">
    <canvas class="menu-particles" id="menuCanvas"></canvas>

    <!-- Napis Wisp nad tytułem -->
    <div class="menu-wisp-brand">
      <div class="menu-wisp-logo">
        <svg width="40" height="40" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <!-- Brak tła — tylko poświata i twarz -->
          <ellipse cx="26" cy="27" rx="12" ry="14" fill="#80ee60" filter="url(#glow)"/>
          <circle cx="22" cy="23" r="3" fill="#0a200a"/>
          <circle cx="30" cy="23" r="3" fill="#0a200a"/>
          <circle cx="22.8" cy="22.2" r="1.2" fill="white"/>
          <circle cx="30.8" cy="22.2" r="1.2" fill="white"/>
          <defs>
            <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
        </svg>
      </div>
      <span class="menu-wisp-name">🌿 Wisp</span>
    </div>

    <!-- Tytuł gry -->
    <div class="menu-logo-row">
      <span class="menu-title-text">Forest Cards</span>
    </div>

<script>

// ── AUTH & API ────────────────────────────────────
const FC_TOKEN_KEY = 'fc_jwt';
const FC_USER_KEY  = 'fc_user';

function getToken() { try { return localStorage.getItem(FC_TOKEN_KEY); } catch(e){ return null; } }
function getUser()  { try { const d=localStorage.getItem(FC_USER_KEY); return d?JSON.parse(d):null; } catch(e){ return null; } }
function setToken(t){ try { localStorage.setItem(FC_TOKEN_KEY, t); } catch(e){} }
function setUser(u) { try { localStorage.setItem(FC_USER_KEY, JSON.stringify(u)); } catch(e){} }
function clearAuth(){ try { localStorage.removeItem(FC_TOKEN_KEY); localStorage.removeItem(FC_USER_KEY); } catch(e){} }

function authHeaders(){ return { 'Authorization':'Bearer '+getToken(), 'Content-Type':'application/json' }; }

async function apiGet(path){
  const r = await fetch(path, { headers: authHeaders() });
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function apiPost(path, body){
  const r = await fetch(path, { method:'POST', headers: authHeaders(), body: JSON.stringify(body) });
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

async function syncMe(){
  try {
    const u = await apiGet('/auth/me');
    setUser(u);
    return u;
  } catch(e) { return null; }
}

async function syncProgressFromServer(){
  // Pobierz postęp z serwera i scal z lokalnym (wyższe wygrywa)
  try {
    const sv = await apiGet('/api/progress');
    const localTs = Math.floor((parseInt(localStorage.getItem('fc_progressTs')||'0')));
    if(sv.progress_ts >= localTs){
      // Serwer ma nowszy lub równy zapis — użyj go
      GS.mushrooms    = sv.mushrooms    ?? GS.mushrooms;
      GS.wins         = Math.max(GS.wins,         sv.wins ?? 0);
      GS.battleLevel  = Math.max(GS.battleLevel,  sv.battle_level ?? 1);
      if(Array.isArray(sv.collection) && sv.collection.length > GS.collection.length){
        GS.collection = sv.collection;
      }
      saveSave();
    }
    // Zawsze wyślij lokalny stan (wins, score, collection) do serwera po syncu
    await pushProgressToServer();
  } catch(e) {}
}

async function pushProgressToServer(){
  try {
    await apiPost('/api/progress', {
      mushrooms:    GS.mushrooms    || 0,
      wins:         GS.wins         || 0,
      battle_level: GS.battleLevel  || 1,
      score:        (GS.wins||0)*200 + (GS.battleLevel||1)*50,
      collection:   GS.collection   || [],
      ts:           Date.now(),
    });
    localStorage.setItem('fc_progressTs', String(Math.floor(Date.now()/1000)));
  } catch(e) {}
}

function getDeviceId(){
  try {
    const KEY = 'fc_device_id';
    let id = localStorage.getItem(KEY);
    if(!id){
      id = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c/4).toString(16));
      localStorage.setItem(KEY, id);
    }
    return id;
  } catch(e){ return null; }
}

async function pushScoreToServer(){
  const score        = (GS.wins||0)*200 + (GS.battleLevel||1)*50;
  const wins         = GS.wins        || 0;
  const battle_level = GS.battleLevel || 1;

  if(getToken()){
    // Zalogowany → /api/score
    try {
      await apiPost('/api/score', { score, wins, battle_level });
    } catch(e) {}
  } else {
    // Gość → /api/score/guest z device_id
    try {
      const nick = FCLANG.rankYou||'Guest';
      fetch('/api/score/guest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nick, score, wins, battle_level, device_id: getDeviceId() }),
      }).catch(()=>{});
    } catch(e) {}
  }
}

          background:rgba(80,20,20,.7);color:#e09090;border:1px solid #602020;border-radius:6px;cursor:pointer;">

const FCAuth = {
  login()  { window.location.href = '/auth/google'; },
  logout() {
    clearAuth();
    updateAuthUI();
    showToast(FCLANG.loggedOut||'Signed out.');
  },
  async changeNick(){
    const nick = prompt(FCLANG.nickPrompt||'New nick (max 20 chars):');
    if(!nick || !nick.trim()) return;
    try {
      await apiPost('/api/account/nick', { nick: nick.trim() });
      const u = getUser();
      if(u){ u.nick = nick.trim(); setUser(u); }
      updateAuthUI();
      showToast(FCLANG.nickChanged||'✅ Nick updated!');
    } catch(e) { showToast(FCLANG.nickError||'Error changing nick.'); }
  },
};

const FC_LANG_CYCLE = ['pl','en','de','es','fr'];
const FC_LANG_FLAGS = {pl:'🇵🇱',en:'🇬🇧',de:'🇩🇪',es:'🇪🇸',fr:'🇫🇷'};
const FC_LANG_ISO   = {pl:'pl',en:'gb',de:'de',es:'es',fr:'fr'};

// Detect browser language
const _fcBrowserLang = (navigator.language||'en').slice(0,2).toLowerCase();
let FC_LANG_CODE = FC_LANG_CYCLE.includes(_fcBrowserLang) ? _fcBrowserLang : 'en';
// Override with saved preference
try { const s=localStorage.getItem('fc_lang'); if(s && FC_LANG_CYCLE.includes(s)) FC_LANG_CODE=s; } catch(e){}
let FCLANG = FC_LANGS[FC_LANG_CODE];

function toggleFCLang() {
  const idx = FC_LANG_CYCLE.indexOf(FC_LANG_CODE);
  FC_LANG_CODE = FC_LANG_CYCLE[(idx+1) % FC_LANG_CYCLE.length];
  FCLANG = FC_LANGS[FC_LANG_CODE];
  try { localStorage.setItem('fc_lang', FC_LANG_CODE); } catch(e){}
  applyFCLang();
}

function applyFCLang() {
  const L = FCLANG;
  const $ = id => document.getElementById(id);
  document.documentElement.lang = FC_LANG_CODE;

  const setT = (id,v) => { const e=$(id); if(e) e.textContent=v; };
  const setH = (id,v) => { const e=$(id); if(e) e.innerHTML=v; };

  // Lang buttons (menu + all subpages)
  const _langLabel = FC_LANG_FLAGS[FC_LANG_CODE]+' '+FC_LANG_CODE.toUpperCase();
  ['fc-lang-btn','fc-lang-guide','fc-lang-ranking','fc-lang-deck','fc-lang-shop'].forEach(id => setT(id, _langLabel));

  // Menu
  setH('fc-subtitle', L.subtitle);
  setT('fc-choosediff', L.chooseDiff);
  setT('fc-diff-easy-lbl', L.easy);
  setH('fc-diff-easy-lives', L.easyLives);
  setT('fc-diff-med-lbl', L.medium);
  setH('fc-diff-med-lives', L.mediumLives);
  setT('fc-diff-hard-lbl', L.hard);
  setH('fc-diff-hard-lives', L.hardLives);
  setT('fc-play-btn', L.play);
  setT('fc-btn-guide', L.guide);
  setT('fc-btn-ranking', L.ranking);
  setT('fc-btn-deck', L.deck);
  setT('fc-btn-shop', L.shop);
  setT('fc-privacy-lnk', L.privacy);
  setT('fc-terms-lnk', L.terms);
  // reset label
  const rl = $('fc-reset-link');
  if(rl && (GS.wins>0||GS.battleLevel>1)) rl.textContent = L.resetSave;

  // Pre-battle
  setT('fc-pb-title', L.pbTitle);
  setT('fc-pb-enemy-lbl', L.pbEnemyLbl);
  setT('fc-pb-your-lbl', L.pbYourLbl);
  setT('fc-pb-random-btn', L.pbRandom);
  setT('fc-pb-manual-btn', L.pbManual);
  setT('fc-pb-start-btn', L.pbStart);
  setT('fc-pb-back-btn', L.pbBack);

  // Battle
  setT('fc-bt-enemy-lbl', L.enemyCardsLbl);
  setT('fc-bt-hand-lbl', L.yourHandLbl);
  setT('battleLog', L.battleLog);
  setT('playerName', L.playerName);
  setT('fc-pause-title', L.pauseTitle);
  setT('fc-pause-resume', L.resume);

// ═══════════════════════════════════════════════
//  AUDIO ENGINE v2 — Rich procedural sound
// ═══════════════════════════════════════════════
const Audio = (() => {
  let actx = null, masterGain = null, musicGain = null, sfxGain = null;
  let musicNodes = [], currentTheme = -1, muted = false;
  let musicTimer = null;

  function init() {
    if(actx) return;
    actx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = actx.createGain(); masterGain.gain.value = 0.8; masterGain.connect(actx.destination);
    musicGain  = actx.createGain(); musicGain.gain.value  = 0.28; musicGain.connect(masterGain);
    sfxGain    = actx.createGain(); sfxGain.gain.value    = 0.7;  sfxGain.connect(masterGain);
  }

  function now() { return actx.currentTime; }

  // ── Low-level primitives ──────────────────────
  function osc(freq, type, vol, att, sus, rel, delay=0, dest=null, detune=0) {
    if(!actx||muted) return null;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; if(detune) o.detune.value=detune;
    const t=now()+delay;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+att);
    g.gain.setValueAtTime(vol,t+att+sus);
    g.gain.exponentialRampToValueAtTime(0.0001,t+att+sus+rel);
    o.connect(g); g.connect(dest||sfxGain);
    o.start(t); o.stop(t+att+sus+rel+0.05);
    return o;
  }

  function oscSlide(f1, f2, type, vol, dur, delay=0, dest=null) {
    if(!actx||muted) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type;
    const t=now()+delay;
    o.frequency.setValueAtTime(f1,t);
    o.frequency.exponentialRampToValueAtTime(f2,t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur+0.05);
    o.connect(g); g.connect(dest||sfxGain);
    o.start(t); o.stop(t+dur+0.1);
  }

  function noise(vol, dur, freq, q, delay=0, dest=null) {
    if(!actx||muted) return;
    const buf=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=actx.createBufferSource();
    const flt=actx.createBiquadFilter();
    flt.type='bandpass'; flt.frequency.value=freq; flt.Q.value=q;
    const g=actx.createGain();
    const t=now()+delay;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(dest||sfxGain);
    src.start(t); src.stop(t+dur+0.05);
  }

  function chord(freqs, type, vol, att, sus, rel, delay=0, dest=null) {
    freqs.forEach((f,i) => osc(f, type, vol/(i+1)*0.9, att, sus, rel, delay, dest));
  }

  function reverb(wet=0.3) {
    if(!actx) return null;
    const conv = actx.createConvolver();
    const len = actx.sampleRate * 1.5;
    const buf = actx.createBuffer(2, len, actx.sampleRate);
    for(let c=0;c<2;c++){
      const d=buf.getChannelData(c);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5);
    }
    conv.buffer = buf;
    const g = actx.createGain(); g.gain.value = wet;
    conv.connect(g); g.connect(masterGain);
    return conv;
  }

  // ── SFX ─────────────────────────────────────────

  // Kliknięcie karty — magiczny "pick up"
  function sfxCardSelect() {
    osc(440,'sine',.15,.005,.03,.12);
    osc(660,'triangle',.08,.005,.02,.1,.02);
    osc(880,'sine',.05,.005,.01,.08,.04);
    noise(.04,.06,2000,3,.01);
  }

  // Atak — potężne uderzenie z impact
  // Atak — trzask pioruna (prosta, pewna metoda)
  function sfxAttack() {
    if(!actx||muted) return;
    // Wypełnij bufor czystym szumem z eksponencjalnym zanikaniem
    const sr = actx.sampleRate;
    const dur = 0.08;
    const buf = actx.createBuffer(1, Math.floor(sr*dur), sr);
    const data = buf.getChannelData(0);
    for(let i=0;i<data.length;i++){
      data[i] = (Math.random()*2-1) * Math.exp(-i/(sr*0.012));
    }
    const src = actx.createBufferSource();
    src.buffer = buf;
    // Filtr górnoprzepustowy — tylko wyższe tony jak iskra
    const hp = actx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 1800;
    // Głośność
    const g = actx.createGain();
    g.gain.value = 0.35;
    src.connect(hp); hp.connect(g); g.connect(actx.destination);
    src.start();
    // Drugi krótki trzask jako echo
    setTimeout(()=>{
      if(!actx||muted) return;
      const buf2 = actx.createBuffer(1, Math.floor(sr*0.04), sr);
      const d2 = buf2.getChannelData(0);
      for(let i=0;i<d2.length;i++) d2[i]=(Math.random()*2-1)*Math.exp(-i/(sr*0.006));
      const s2=actx.createBufferSource(), hp2=actx.createBiquadFilter(), g2=actx.createGain();
      hp2.type='highpass'; hp2.frequency.value=2500;
      g2.gain.value=0.15;
      s2.buffer=buf2; s2.connect(hp2); hp2.connect(g2); g2.connect(actx.destination);
      s2.start();
    }, 70);
  }

  // Trafienie w kartę — ból / impact
  function sfxHit() {
    noise(.08,.05,400,1.5);
  }

  // Przewaga typu — magiczny efekt żywiołu
  function sfxTypeAdv() {
    // Rising sparkle
    [523,659,784,1047,1319].forEach((f,i) => {
      osc(f,'sine',.14,.01,.05,.2,i*.06);
      osc(f*1.5,'triangle',.05,.01,.03,.12,i*.06);
    });
    // Magic burst
    noise(.08,.15,3000,4,.25);
    osc(2093,'sine',.1,.005,.08,.3,.3);
  }

  // Zwycięstwo — triumfalna fanfara
  function sfxWin() {
    const melody = [
      [523,.0],[659,.12],[784,.24],[1047,.38],
      [784,.54],[880,.66],[1047,.78],[1319,.94],
      [1047,1.12],[1319,1.26],[1568,1.42]
    ];
    melody.forEach(([f,t]) => osc(f,'sine',.18,.02,.07,.18,t));
    // Harmony
    [[330,.0],[415,.12],[494,.24],[659,.38],[784,.94],[1047,1.42]]
      .forEach(([f,t]) => osc(f,'triangle',.08,.02,.07,.2,t));
    // Bass
    [130,165,196,261].forEach((f,i) => osc(f,'sine',.14,.02,.1,.2,i*.38));
    // Sparkle
    for(let i=0;i<8;i++) noise(.04,.08,2000+i*200,3,.1+i*.15);
  }

  // Porażka — opadający lament
  function sfxLose() {
    oscSlide(440,55,'sawtooth',.22,.9);
    oscSlide(330,41,'sawtooth',.12,.7,.1);
    oscSlide(220,27,'sine',.1,.6,.2);
    noise(.15,.4,200,.8,.05);
    [440,330,220,165].forEach((f,i) => osc(f,'sine',.06,.01,.05,.2,i*.2));
  }

  // Odkrycie karty z paczki
  function sfxCardReveal() {
    oscSlide(300,1200,'sine',.15,.25);
    noise(.1,.1,4000,5,.1);
    osc(1047,'sine',.12,.005,.04,.2,.2);
    osc(1319,'triangle',.08,.005,.03,.15,.26);
  }

  // Karta legendarna / mityczna
  function sfxLegendaryReveal() {
    [130,164,195,261,330,392,523].forEach((f,i) => {
      osc(f,'sine',.12,.03,.2,.4,i*.08);
      osc(f*2,'triangle',.06,.03,.15,.3,i*.08);
    });
    noise(.1,.3,500,2,.5);
    noise(.08,.2,2000,4,.6);
    osc(2093,'sine',.15,.01,.15,.5,.55);
  }

  // Dodanie karty do talii
  function sfxDeckAdd() {
    osc(523,'triangle',.12,.01,.03,.12);
    osc(784,'sine',.08,.01,.02,.1,.05);
    noise(.04,.04,3000,4,.03);
  }

  // Usunięcie z talii
  function sfxDeckRemove() {
    osc(330,'triangle',.1,.01,.03,.1);
    oscSlide(440,220,'sine',.08,.1);
  }

  // Klik menu
  function sfxMenuClick() {
    osc(660,'triangle',.09,.005,.015,.07);
    osc(880,'sine',.05,.005,.01,.05,.02);
  }

  // Zakup paczki
  function sfxBuyPack() {
    [392,494,587,740].forEach((f,i) => osc(f,'sine',.14,.01,.05,.18,i*.07));
    noise(.06,.1,3000,3,.3);
    osc(1568,'sine',.1,.005,.1,.3,.3);
  }

  // ── MUSIC — Rich procedural themes ──────────────

  function stopMusic() {
    musicNodes.forEach(n=>{try{n.stop();}catch(e){}});
    musicNodes=[];
    if(musicTimer) { clearTimeout(musicTimer); musicTimer=null; }
    currentTheme=-1;
  }

  function playTheme(idx) {
    if(!actx||muted) return;
    if(currentTheme===idx) return;
    stopMusic(); currentTheme=idx;
    if(idx===0) menuTheme();
    else if(idx===1) battleTheme();
    else shopTheme();
  }

  // ── MENU: Mystical forest ambience ───────────────
  // Rich layered: bass drone + pentatonic arpegio + bird calls + wind
  // ── MENU: Zaczarowany Las — jak w Wisp poziomy 1-3 ──
  function menuTheme() {
    const scale = [261,294,330,349,392,440,494,523];
    let t = now() + 0.1;
    const loop = () => {
      if(currentTheme!==0) return;
      [261,330,392].forEach((f) => {
        const o=actx.createOscillator(), g=actx.createGain();
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.055,t+.35);
        g.gain.setValueAtTime(.055,t+1.9); g.gain.exponentialRampToValueAtTime(.0001,t+2.5);
        o.connect(g); g.connect(musicGain); o.start(t); o.stop(t+2.6); musicNodes.push(o);
      });
      for(let i=0;i<8;i++){
        const f=scale[Math.floor(Math.random()*scale.length)]*(Math.random()>.65?2:1);
        const o=actx.createOscillator(), g=actx.createGain();
        o.type='triangle'; o.frequency.value=f;
        const st=t+i*.28+Math.random()*.05;
        g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(.042,st+.04);
        g.gain.exponentialRampToValueAtTime(.0001,st+.24);
        o.connect(g); g.connect(musicGain); o.start(st); o.stop(st+.3); musicNodes.push(o);
      }
      if(Math.random()>.35){
        const f=750+Math.random()*500, st=t+1.4+Math.random()*.5;
        const o=actx.createOscillator(), g=actx.createGain(); o.type='sine';
        o.frequency.setValueAtTime(f,st); o.frequency.exponentialRampToValueAtTime(f*1.35,st+.16); o.frequency.exponentialRampToValueAtTime(f,st+.32);
        g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(.048,st+.05);
        g.gain.setValueAtTime(.048,st+.28); g.gain.exponentialRampToValueAtTime(.0001,st+.38);
        o.connect(g); g.connect(musicGain); o.start(st); o.stop(st+.45); musicNodes.push(o);
      }
      if(Math.random()>.6){
        const f=900+Math.random()*400, st=t+.6+Math.random()*.8;
        const o=actx.createOscillator(), g=actx.createGain(); o.type='sine';
        o.frequency.setValueAtTime(f,st); o.frequency.linearRampToValueAtTime(f*1.5,st+.1); o.frequency.linearRampToValueAtTime(f*1.2,st+.2);
        g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(.035,st+.03);
        g.gain.exponentialRampToValueAtTime(.0001,st+.25);
        o.connect(g); g.connect(musicGain); o.start(st); o.stop(st+.3); musicNodes.push(o);
      }
      t += 2.4;
      musicTimer = setTimeout(()=>{ if(currentTheme===0) loop(); }, 2200);
    };
    loop();
  }

  // ── BATTLE: Mroczny Las — klimat Wispa poziomy 4-7 ──
  // Niskie pady sinusowe + wolne arpeggio moll + niepokojące piny
  function battleTheme() {
    const darkScale = [220,247,277,294,330,370,415,440];
    let t = now() + 0.1;
    const loop = () => {
      if(currentTheme!==1) return;

      // Mroczne arpeggio moll triangle — jak w Wisp ale wolniejsze
      for(let i=0;i<6;i++){
        const f=darkScale[Math.floor(Math.random()*darkScale.length)];
        const o=actx.createOscillator(), g=actx.createGain();
        o.type='triangle'; o.frequency.value=f;
        const st=t+i*.45+Math.random()*.08;
        g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(.032,st+.06);
        g.gain.exponentialRampToValueAtTime(.0001,st+.38);
        o.connect(g); g.connect(musicGain); o.start(st); o.stop(st+.45); musicNodes.push(o);
      }

      // Niepokojący wysoki ton — jak duch
      if(Math.random()>.45){
        const f=440+Math.random()*220;
        const st=t+.8+Math.random()*2;
        const o=actx.createOscillator(), g=actx.createGain();
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(.025,st+.15);
        g.gain.setValueAtTime(.025,st+.5); g.gain.exponentialRampToValueAtTime(.0001,st+1.2);
        o.connect(g); g.connect(musicGain); o.start(st); o.stop(st+1.3); musicNodes.push(o);
      }

      // Dysonansowe uderzenie co kilka taktów
      if(Math.random()>.55){
        const st=t+1.5+Math.random();
        [220,233].forEach((f,i) => {
          const o=actx.createOscillator(), g=actx.createGain();
          o.type='triangle'; o.frequency.value=f;
          g.gain.setValueAtTime(.02,st+i*.05); g.gain.exponentialRampToValueAtTime(.0001,st+.6);
          o.connect(g); g.connect(musicGain); o.start(st); o.stop(st+.65); musicNodes.push(o);
        });
      }

      t += 3.8;
      musicTimer = setTimeout(()=>{ if(currentTheme===1) loop(); }, 3600);
    };
    loop();
  }
  // ── SHOP: Las o Zmierzchu — jak Wisp poziomy 4-5 ──
  function shopTheme() {
    const scale = [233,277,311,370,415,466,523];
    let t = now() + 0.1;
    const loop = () => {
      if(currentTheme!==2) return;
      [233,277,349].forEach((f) => {
        const o=actx.createOscillator(), g=actx.createGain();
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.052,t+.65);
        g.gain.setValueAtTime(.052,t+2.5); g.gain.exponentialRampToValueAtTime(.0001,t+3.3);
        o.connect(g); g.connect(musicGain); o.start(t); o.stop(t+3.4); musicNodes.push(o);
      });
      for(let i=0;i<5;i++){
        const f=scale[Math.floor(Math.random()*scale.length)]*(Math.random()>.5?2:1);
        const o=actx.createOscillator(), g=actx.createGain();
        o.type='triangle'; o.frequency.value=f;
        const st=t+i*.5+Math.random()*.1;
        g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(.038,st+.1);
        g.gain.exponentialRampToValueAtTime(.0001,st+.42);
        o.connect(g); g.connect(musicGain); o.start(st); o.stop(st+.5); musicNodes.push(o);
      }
      if(Math.random()>.45){
        const f=1047+Math.floor(Math.random()*3)*131, st=t+1+Math.random()*1.5;
        const o=actx.createOscillator(), g=actx.createGain();
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(.038,st+.03);
        g.gain.exponentialRampToValueAtTime(.0001,st+.65);
        o.connect(g); g.connect(musicGain); o.start(st); o.stop(st+.7); musicNodes.push(o);
      }
      t += 3.0;
      musicTimer = setTimeout(()=>{ if(currentTheme===2) loop(); }, 2800);
    };
    loop();
  }
  function setMute(v) {
    muted=v;
    if(masterGain) masterGain.gain.value = v ? 0 : 0.8;
  }

  return {
    init, playTheme, stopMusic, setMute,
    sfxCardSelect, sfxAttack, sfxHit, sfxTypeAdv,
    sfxWin, sfxLose, sfxCardReveal, sfxLegendaryReveal,
    sfxDeckAdd, sfxDeckRemove, sfxMenuClick, sfxBuyPack
  };
})();

// ═══════════════════════════════════════════════
//  DECK BUILDER
// ═══════════════════════════════════════════════
const MAX_DECK = 9999; // bez limitu
const MIN_DECK = 4;  // minimum do gry
const MAX_COPIES = 99; // bez limitu kopii // max copies of same card in deck

function renderDeckBuilder() {
  // Sprawdź czy talia odblokowana (po pierwszej wygranej)
  const locked = GS.wins === 0 && GS.battleLevel <= 1;
  document.getElementById('deckLocked').style.display  = locked ? 'flex' : 'none';
  document.getElementById('deckEditor').style.display  = locked ? 'none' : 'flex';
  if(locked) return;

  renderCollectionPanel();
  renderDeckPanel();
  updateDeckInfo();
}

function renderCollectionPanel() {
  const panel = document.getElementById('collectionPanel');
  panel.innerHTML = '';

  CARD_DB.forEach(cardDef => {
    const owned = GS.collection.find(c => c.id === cardDef.id);
    const count = owned ? owned.count : 0;
    if(count === 0) return;
    const inDeck = GS.deck.filter(id => id === cardDef.id).length;

    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;cursor:pointer;transition:opacity .2s;';
    const cv = drawCard(cardDef.id, 72, 108);
    wrap.appendChild(cv);

    // Odznaka ile w talii
    if(inDeck > 0) {
      const badge = document.createElement('div');
      badge.style.cssText = `position:absolute;top:3px;right:3px;background:#1a5a1a;border:1px solid #3aaa2a;border-radius:8px;padding:1px 6px;font-family:'Cinzel',cursive;font-size:10px;color:#b8ffa0;pointer-events:none;`;
      badge.textContent = `✓${inDeck}`;
      wrap.appendChild(badge);
    }

    const cnt = document.createElement('div');
    cnt.style.cssText = 'text-align:center;font-size:9px;color:#4a8a6a;margin-top:2px;font-family:Cinzel,serif;';
    cnt.textContent = FCLANG.deckOwnedInDeck(count,inDeck);
    wrap.appendChild(cnt);

    wrap.draggable = true;
    wrap.addEventListener('dragstart', e => {
      e.dataTransfer.setData('cardId', cardDef.id);
      e.dataTransfer.effectAllowed = 'copy';
      wrap.style.opacity = '0.5';
    });
    wrap.addEventListener('dragend', () => { wrap.style.opacity = '1'; });
    wrap.addEventListener('click', () => { deckPlus(cardDef.id); });
    wrap.title = FCLANG.deckDragTip||'Click → add to deck';
    panel.appendChild(wrap);
  });
}

function renderDeckPanel() {
  const panel = document.getElementById('deckPanel');
  // Zachowaj strefę drop — wyczyść tylko karty
  const hint = document.getElementById('deckEmptyHint');
  // Usuń stare karty (nie hint)
  Array.from(panel.children).forEach(c => { if(c !== hint) c.remove(); });

  const unique = [...new Set(GS.deck)];
  hint.style.display = unique.length === 0 ? 'block' : 'none';

  unique.forEach(cardId => {
    const cardDef = CARD_DB.find(c => c.id === cardId);
    if(!cardDef) return;
    const inDeck = GS.deck.filter(id => id === cardId).length;

    const wrap = document.createElement('div');
    wrap.style.cssText = `position:relative;cursor:pointer;`;
    wrap.title = FCLANG.deckRemoveTip||'Click → remove';
    const cv = drawCard(cardId, 72, 108);
    wrap.appendChild(cv);

    // Licznik kopii w talii
    const badge = document.createElement('div');
    badge.style.cssText = `position:absolute;top:3px;right:3px;background:#3a1a1a;border:1px solid #aa3030;border-radius:8px;padding:1px 6px;font-family:'Cinzel',cursive;font-size:10px;color:#ffb0b0;pointer-events:none;`;
    badge.textContent = `×${inDeck}`;
    wrap.appendChild(badge);

    // Przycisk usuń
    const del = document.createElement('div');
    del.style.cssText = `text-align:center;font-size:10px;color:#ff6060;margin-top:2px;font-family:'Cinzel',cursive;`;
    del.textContent = FCLANG.deckRemove||'✕ remove';
    wrap.appendChild(del);

    wrap.addEventListener('click', () => { deckMinus(cardId); });
    panel.appendChild(wrap);
  });
}

function onDropToDeck(e) {
  e.preventDefault();
  document.getElementById('deckPanel').style.borderColor = 'rgba(80,140,200,.2)';
  const cardId = e.dataTransfer.getData('cardId');
  if(cardId) deckPlus(cardId);
}

function deckPlus(cardId) {
  const owned = GS.collection.find(c => c.id === cardId);
  const count = owned ? owned.count : 0;
  const inDeck = GS.deck.filter(id => id === cardId).length;
  if(inDeck >= Math.min(count, MAX_COPIES)) return; // już max kopii tej karty

  GS.deck.push(cardId);
  saveSave();
  try{ Audio.sfxDeckAdd(); }catch(e){}
  renderCollectionPanel();
  renderDeckPanel();
  updateDeckInfo();
}

function deckMinus(cardId) {
  const idx = GS.deck.lastIndexOf(cardId);
  if(idx !== -1) {
    GS.deck.splice(idx, 1);
    saveSave();
    try{ Audio.sfxDeckRemove(); }catch(e){}
    renderCollectionPanel();
    renderDeckPanel();
    updateDeckInfo();
  }
}

function addToDeck(id) {
  deckPlus(id);
}

function removeFromDeck(id) {
  const idx = GS.deck.lastIndexOf(id);
  if(idx === -1) return;
  GS.deck.splice(idx, 1);
  saveSave();
  updateDeckInfo();
}

function updateDeckInfo() {
  const cnt = document.getElementById('deckCount');
  const n = GS.deck.length;
  if(cnt) {
    cnt.textContent = FCLANG.deckNCards(n);
    cnt.style.color = n >= 4 ? '#80ff80' : '#ffcc60';
  }
  const lst = document.getElementById('deckList');
  if(lst) {
    if(n < 4) {
      lst.textContent = FCLANG.deckNeed(4-n);
      lst.style.color = '#ffaa40';
    } else {
      const counts = {};
      GS.deck.forEach(id => { counts[id] = (counts[id]||0)+1; });
      const summary = Object.entries(counts).map(([id,c]) => {
        const card = CARD_DB.find(x=>x.id===id);
        return `${card?.emoji||'?'} ${(FCLANG.cardNames||{})[id]||card?.name||id}${c>1?` ×${c}`:''}`;
      }).join('  ·  ');
      lst.textContent = '✅ ' + summary;
      lst.style.color = '#60c060';
    }
  }
}

const FC_DIFF_CONFIG = {
  easy:   { atkMult:0.70, defMult:1.30, get label(){ return '😊 '+(FCLANG.easy||'Easy');   }, lives:5 },
  medium: { atkMult:1.00, defMult:1.00, get label(){ return '😐 '+(FCLANG.medium||'Medium'); }, lives:3 },
  hard:   { atkMult:1.30, defMult:0.70, get label(){ return '💀 '+(FCLANG.hard||'Hard');   }, lives:1 },
};
let FC_DIFF = 'easy';

function selectDifficulty(d) {
  FC_DIFF = d;
  // Aktualizuj życia tylko gdy gra jeszcze nie wystartowała
  if(GS.wins === 0 && GS.battleLevel <= 1) {
    GS.lives = (FC_DIFF_CONFIG[d] || FC_DIFF_CONFIG.easy).lives;
    saveSave();
    updateMenuLives();
  }
  ['easy','medium','hard'].forEach(x => {
    const el = document.getElementById('fc-diff-'+x);
    if(el) el.classList.toggle('selected', x===d);
  });
  GS.difficulty = d;
  saveSave();
}

// continueCampaign — przeniesiona niżej

function resetSaveConfirm() {
  if(confirm(FCLANG.resetConfirm||'Delete save?')) {
    try{ localStorage.removeItem('fc_save'); }catch(e){}
    location.reload();
  }
}

function updateMenuContinue() {
  const btn = document.getElementById('fc-btn-continue');
  const reset = document.getElementById('fc-reset-link');
  if(!btn) return;
  if(GS.wins > 0 || GS.battleLevel > 1) {
    btn.style.display = 'block';
    btn.textContent = FCLANG.continueBtn(GS.battleLevel,getPlayerScore());
    if(reset) reset.style.display = 'block';
  } else {
    btn.style.display = 'none';
    if(reset) reset.style.display = 'none';
  }
}

function initGame() {
  try {
    const saved = loadSave();
    if (saved && saved.lives !== undefined && saved.deck) {
      GS = saved;
      if(GS.mushrooms === undefined) GS.mushrooms = 5;
      if(GS.lastLogin === undefined) GS.lastLogin = '';

    } else {
      resetGS();
    }
  } catch(e) {
    resetGS();
  }
  FC_DIFF = GS.difficulty || 'easy';
  selectDifficulty(FC_DIFF);
  checkDailyLogin();
  updateMenuLives();
  updateMenuContinue();
  try { renderCollection(); } catch(e){}
}

function resetGS() {
  GS.lives = (FC_DIFF_CONFIG[FC_DIFF] || FC_DIFF_CONFIG.easy).lives;
  GS.wins = 0;
  GS.battleLevel = 1;
  GS.collection = STARTER_DECK.map(id => ({id, count:1}));
  GS.deck = [...STARTER_DECK];
  GS.mushrooms = 5;
  GS.lastLogin = '';
  try { saveSave(); } catch(e){}
}

// ── GRZYBKI 🍄 ────────────────────────────────────
function checkDailyLogin() {
  const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  if(GS.lastLogin !== today) {
    GS.lastLogin = today;
    GS.mushrooms = (GS.mushrooms || 0) + 1;
    saveSave();
    setTimeout(() => showToast(FCLANG.dailyMush||'🍄 +1 Mushroom!'), 800);
  }
  updateMushroomDisplay();
}

function updateMushroomDisplay() {
  const el = document.getElementById('mushroomCount');
  if(el) el.textContent = `🍄 ${GS.mushrooms || 0}`;
}

// Cena karty: 1-10 grzybków wg siły (atk+def+hp)
function cardPrice(cardId) {
  const card = CARD_DB.find(c => c.id === cardId);
  if(!card) return 5;
  const power = card.atk + card.def + card.hp;
  // power min ~12 (seed), max ~56 (heart) → mapuj na 1-10
  return Math.max(1, Math.min(10, Math.round((power - 10) / 5)));
}

function saveSave() {
  try { localStorage.setItem('fc_save', JSON.stringify(GS)); } catch(e){}
}
function loadSave() {
  try { const d = localStorage.getItem('fc_save'); return d ? JSON.parse(d) : null; } catch(e){ return null; }
}

// ── CARD DRAWING ─────────────────────────────────
function drawCard(id, width=80, height=120, isBack=false, currentHP=null) {
  const canvas = document.createElement('canvas');
  // Rysuj w 2x rozdzielczości dla ostrości
  const scale = window.devicePixelRatio || 2;
  canvas.width = width * scale;
  canvas.height = height * scale;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  canvas.className = 'card-canvas';
  const c = canvas.getContext('2d');
  c.scale(scale, scale);

  const W = width, H = height;
  const r = 10; // border radius

  if (isBack) {
    // Tył karty — ciemna zieleń z wzorem
    const bg = c.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#0a1e0a'); bg.addColorStop(1,'#162e16');
    c.fillStyle = bg; roundRect(c,0,0,W,H,r); c.fill();
    // Wzór
    c.strokeStyle='rgba(80,160,40,.12)'; c.lineWidth=1;
    for(let i=0;i<W;i+=10) { c.beginPath(); c.moveTo(i,0); c.lineTo(i,H); c.stroke(); }
    for(let j=0;j<H;j+=10) { c.beginPath(); c.moveTo(0,j); c.lineTo(W,j); c.stroke(); }
    // Obramowanie
    c.strokeStyle='#3a7a3a'; c.lineWidth=2;
    roundRect(c,1,1,W-2,H-2,r); c.stroke();
    // Logo
    c.font=`${W*0.4}px serif`; c.textAlign='center'; c.textBaseline='middle';
    c.fillStyle='rgba(80,200,60,.6)'; c.fillText('🌿',W/2,H/2);
    return canvas;
  }

  const card = CARD_DB.find(x=>x.id===id);
  if (!card) return canvas;

  const rc = RARITY_COLORS[card.rarity];
  const tc = TYPE_COLORS[card.type];

  // ── TŁO KARTY — bogaty gradient ──
  const bgColors = {
    common:  ['#1a1a1a','#252525','#1a1a1a'],
    rare:    ['#0a1a0a','#122212','#0a1a0a'],
    epic:    ['#0a0a20','#121228','#0a0a20'],
    legendary:['#180a28','#221232','#180a28'],
    mythic:  ['#201000','#301800','#201000'],
  };
  const bgC = bgColors[card.rarity] || bgColors.common;
  const bg = c.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,bgC[0]); bg.addColorStop(0.5,bgC[1]); bg.addColorStop(1,bgC[2]);
  c.fillStyle=bg; roundRect(c,0,0,W,H,r); c.fill();

  // ── BLASK KRAWĘDZIOWY wg rzadkości ──
  const glowColors = {
    common:'rgba(160,160,160,.15)', rare:'rgba(40,200,40,.2)',
    epic:'rgba(80,80,255,.25)', legendary:'rgba(200,100,255,.3)', mythic:'rgba(255,160,0,.35)'
  };
  const edgeGlow = c.createLinearGradient(0,0,W,H);
  edgeGlow.addColorStop(0,glowColors[card.rarity]);
  edgeGlow.addColorStop(0.5,'transparent');
  edgeGlow.addColorStop(1,glowColors[card.rarity]);
  c.fillStyle=edgeGlow; roundRect(c,0,0,W,H,r); c.fill();

  // ── NAGŁÓWEK — gradient koloru typu ──
  const hh = H*0.30;
  const hg = c.createLinearGradient(0,0,W,hh);
  hg.addColorStop(0, tc+'55'); hg.addColorStop(1, tc+'11');
  c.fillStyle=hg; roundRect(c,0,0,W,hh,r); c.fill();
  // dolna krawędź nagłówka — linia koloru
  c.strokeStyle=tc+'44'; c.lineWidth=1;
  c.beginPath(); c.moveTo(4,hh); c.lineTo(W-4,hh); c.stroke();

  // ── EMOJI POSTACI — duże, wyraźne ──
  const emojiY = H*0.36;
  const emojiSize = Math.floor(W * 0.55);
  c.font=`${emojiSize}px serif`;
  c.textAlign='center'; c.textBaseline='middle';
  // Cień pod emoji dla głębi
  c.shadowColor=tc+'88'; c.shadowBlur=W*0.15;
  c.fillText(card.emoji, W/2, emojiY);
  c.shadowBlur=0;

  // ── NAZWA ──
  const nameFontSize = Math.max(8, Math.floor(W*0.115));
  c.fillStyle='#ffffff';
  c.font=`500 ${nameFontSize}px Cinzel, serif`;
  c.textAlign='center'; c.textBaseline='top';
  // Tło pod nazwą
  c.fillStyle='rgba(0,0,0,.5)';
  c.fillRect(0, H*0.63, W, nameFontSize+6);
  c.fillStyle='#ffffff';
  c.fillText((FCLANG.cardNames||{})[card.id]||card.name, W/2, H*0.635);

  // ── TYP — kolorowy badge ──
  const badgeY = H*0.72;
  const badgeH = Math.max(11, H*0.075);
  const badgeW = W*0.82;
  const badgeX = (W-badgeW)/2;
  // Badge tło
  const badgeBg = c.createLinearGradient(badgeX,badgeY,badgeX+badgeW,badgeY);
  badgeBg.addColorStop(0,'transparent');
  badgeBg.addColorStop(0.2,tc+'44');
  badgeBg.addColorStop(0.8,tc+'44');
  badgeBg.addColorStop(1,'transparent');
  c.fillStyle=badgeBg;
  roundRect(c,badgeX,badgeY,badgeW,badgeH,badgeH/2); c.fill();
  // Tekst typu
  const typeFontSize = Math.max(7, Math.floor(W*0.1));
  c.fillStyle=tc;
  c.font=`500 ${typeFontSize}px Cinzel, serif`;
  c.textAlign='center'; c.textBaseline='middle';
  c.fillText((FCLANG.typeNames||TYPE_NAMES)[card.type]||card.type, W/2, badgeY+badgeH/2);

  // ── STATYSTYKI ATK / DEF ──
  const statY = badgeY + badgeH + 3;
  const statFontSize = Math.max(9, Math.floor(W*0.185));
  // Tło statystyk
  c.fillStyle='rgba(0,0,0,.4)';
  c.fillRect(0, statY-2, W, statFontSize+6);
  // ATK
  c.font=`700 ${statFontSize}px Cinzel, serif`;
  c.fillStyle='#ff7070';
  c.textAlign='left'; c.textBaseline='top';
  c.fillText(`⚔ ${card.atk}`, W*0.08, statY);
  // DEF
  c.fillStyle='#60c8ff';
  c.textAlign='right';
  c.fillText(`${card.def} 🛡`, W*0.92, statY);

  // ── PASEK ŻYCIA — zmniejsza się po obrażeniach ──
  const lifeBarH = Math.max(8, H*0.056);
  const lifeBarY = Math.max(H*0.965, statY + statFontSize + 2);
  const lifeBarW = W*0.84;
  const lifeBarX = (W-lifeBarW)/2;
  const curHP  = currentHP !== null ? currentHP : card.hp;
  const ratio  = Math.max(0, Math.min(1, curHP / card.hp));
  // Tło (szare)
  c.fillStyle='rgba(255,255,255,.12)';
  roundRect(c,lifeBarX,lifeBarY,lifeBarW,lifeBarH,lifeBarH/2); c.fill();
  // Wypełnienie — kolor zależy od HP: zielony→żółty→czerwony
  if(ratio > 0) {
    const lifeGrad = c.createLinearGradient(lifeBarX,0,lifeBarX+lifeBarW,0);
    if(ratio > 0.5) {
      lifeGrad.addColorStop(0,'#20cc20'); lifeGrad.addColorStop(1,'#60ff40');
    } else if(ratio > 0.25) {
      lifeGrad.addColorStop(0,'#cc8820'); lifeGrad.addColorStop(1,'#ffcc40');
    } else {
      lifeGrad.addColorStop(0,'#cc2020'); lifeGrad.addColorStop(1,'#ff4040');
    }
    c.fillStyle=lifeGrad;
    roundRect(c,lifeBarX,lifeBarY,lifeBarW*ratio,lifeBarH,lifeBarH/2); c.fill();
  }

  // ── OBRAMOWANIE — grube, świecące ──
  const borderColors = {
    common:'#888888', rare:'#40cc40', epic:'#7070ff',
    legendary:'#dd88ff', mythic:'#ffbb00'
  };
  // Zewnętrzna poświata
  c.shadowColor=rc; c.shadowBlur=W*0.12;
  c.strokeStyle=borderColors[card.rarity]; c.lineWidth=2.5;
  roundRect(c,1.25,1.25,W-2.5,H-2.5,r); c.stroke();
  c.shadowBlur=0;

  // ── KORONA dla Legendarnych i Mitycznych ──
  if(card.rarity==='legendary'||card.rarity==='mythic') {
    c.font=`${Math.floor(W*0.18)}px serif`;
    c.textAlign='center'; c.textBaseline='top';
    c.shadowColor='#ffdd00'; c.shadowBlur=8;
    c.fillText('👑', W/2, 1);
    c.shadowBlur=0;
  }

  // ── Połysk na górze (shine effect) ──
  const shine = c.createLinearGradient(0,0,W*0.6,H*0.4);
  shine.addColorStop(0,'rgba(255,255,255,.12)');
  shine.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=shine;
  roundRect(c,0,0,W,H,r); c.fill();

  return canvas;
}
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

function prebattleToggleCard(cardId) {
  const idx = prebattleHand.indexOf(cardId);
  if(idx !== -1) {
    // Odznacz
    prebattleHand.splice(idx, 1);
  } else {
    if(prebattleHand.length >= 4) {
      document.getElementById('prebattleInfo').textContent = FCLANG.pbMax4||'⚠️ Max 4 cards!';
      return;
    }
    prebattleHand.push(cardId);
  }
  renderPrebattleSelected();
  renderPrebattleCollection();
  const n = prebattleHand.length;
  if(n === 4) {
    document.getElementById('prebattleInfo').textContent = FCLANG.pb4cards||'✅ 4 cards ready!';
    document.getElementById('fc-pb-start-btn').style.display = 'block';
  } else {
    document.getElementById('prebattleInfo').textContent = FCLANG.pbNcards(n);
    document.getElementById('fc-pb-start-btn').style.display = 'none';
  }
}

function renderPrebattleSelected() {
  const el = document.getElementById('prebattleSelected');
  el.innerHTML = '';
  if(prebattleHand.length === 0) {
    el.innerHTML = `<div style="color:#3a6a4a;font-style:italic;font-size:13px;padding:40px 0;">${FCLANG.pbNoCards||'No cards selected'}</div>`;

  const {w: psW, h: psH} = calcCardSize(4);

    const wrap = document.createElement('div');

    if(prebattleMode === 'manual') {
      const x = document.createElement('div');
      x.style.cssText = 'position:absolute;top:2px;right:2px;background:rgba(120,20,20,.9);border-radius:50%;width:18px;height:18px;text-align:center;font-size:11px;line-height:18px;color:#ffaaaa;pointer-events:none;';
      x.textContent = '✕';

}

function renderPrebattleCollection() {
  const el = document.getElementById('prebattleCollection');
  el.innerHTML = '';
  // Pokaż wszystkie posiadane karty
  const pool = GS.deck.length >= 4 ? GS.deck : [...GS.deck, ...STARTER_DECK];
  const unique = [...new Set(pool)];
  unique.forEach(id => {

    wrap.appendChild(drawCard(id, 60, 90));
    if(selected) {

function prebattleStart() {
  if(prebattleHand.length !== 4) return;
  // Przejdź do walki z wybranymi kartami
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('battle').classList.add('active');
  initBattle(prebattleHand);
  try { Audio.playTheme(1); } catch(e){}
}

function initBattle(selectedHand) {
  const enemyIdx = Math.min(GS.battleLevel - 1, ENEMIES.length - 1);
  const enemy = ENEMIES[enemyIdx];

  const hpScale = 1 + (GS.battleLevel - 1) * 0.15;
  const diffCfg = FC_DIFF_CONFIG[FC_DIFF] || FC_DIFF_CONFIG.medium;
  // Przy pierwszej walce ustaw życia z poziomu trudności
  if(GS.battleLevel === 1 && GS.wins === 0) {
    GS.lives = diffCfg.lives;
  }
  battle.enemyMaxHP = 30;
  battle.enemyHP = 30;
  battle.playerMaxHP = 30;
  battle.playerHP = 30;
  battle.over = false;
  battle.turn = 'player';
  battle.selectedCard = null;
  battle.selectedTarget = null;

  // Użyj wybranych kart (z ekranu pre-battle) lub fallback do talii/startera
  let hand4;
  if(selectedHand && selectedHand.length === 4) {
    hand4 = selectedHand;
  } else {
    let pool = GS.deck.length >= 4 ? [...GS.deck] : [...GS.deck, ...STARTER_DECK];
    hand4 = shuffle(pool).slice(0, 4);
  }
  battle.playerHand = hand4.map(id => ({
    id, ...CARD_DB.find(x=>x.id===id), currentHP: CARD_DB.find(x=>x.id===id)?.hp || 10
  }));

  battle.enemyHand = shuffle([...enemy.deck, ...enemy.deck]).slice(0, 4).map(id => ({
    id, ...CARD_DB.find(x=>x.id===id), currentHP: CARD_DB.find(x=>x.id===id)?.hp || 8
  }));

  // Update UI
  document.getElementById('enemyAvatar').textContent = enemy.avatar;
  const _eName = (FCLANG.enemies||[])[Math.min(GS.battleLevel-1,FCLANG.enemies?.length-1||39)]||enemy.name;
document.getElementById('enemyName').textContent = _eName + ` (${FCLANG.poz||'Lv.'} ${GS.battleLevel})`;
  updateHP();
  renderHand();
  renderEnemyField();
  renderLives();
  setLog(`\n👇 ${FCLANG.battleLog||'Select card'} [${FC_DIFF_CONFIG[FC_DIFF]?.label || FC_DIFF}]`);
}

// ── DYNAMIC CARD SIZE ────────────────────────────
function calcCardSize(count=4) {
  const appW = Math.min(window.innerWidth, 480);
  const gap = 6;
  const pad = 10;
  const w = Math.floor((appW - pad*2 - gap*(count-1)) / count);
  const h = Math.floor(w * 1.48);
  return { w, h };
}

function renderHand() {
  const area = document.getElementById('handArea');
  area.innerHTML = '';
  const {w, h} = calcCardSize(4);
  battle.playerHand.forEach((card, i) => {
    if(card.currentHP <= 0) return;
    const wrap = document.createElement('div');
    wrap.className = `card ${card.rarity}`;
    wrap.dataset.idx = i; // indeks w playerHand
    if(battle.selectedCard === i) wrap.classList.add('selected');
    wrap.style.cssText = `position:relative;width:${w}px;height:${h}px;`;
    const canvas = drawCard(card.id, w, h, false, card.currentHP);
    wrap.appendChild(canvas);
    wrap.addEventListener('click', () => selectCard(i));
    area.appendChild(wrap);
  });
}

function renderEnemyField() {
  const field = document.getElementById('enemyField');
  field.innerHTML = '';
  const {w, h} = calcCardSize(4);
  battle.enemyHand.forEach((card, i) => {
    if(card.currentHP <= 0) return;
    const wrap = document.createElement('div');
    wrap.className = `card enemy-card ${card.rarity}`;
    wrap.dataset.idx = i; // indeks w enemyHand
    const canTarget = battle.selectedCard !== null;
    wrap.style.cssText = `width:${w}px;height:${h}px;position:relative;
      ${canTarget ? 'cursor:pointer;animation:enemyPulse 1s ease-in-out infinite;' : ''}`;
    const canvas = drawCard(card.id, w, h, false, card.currentHP);
    wrap.appendChild(canvas);
    if(canTarget) {
      const aim = document.createElement('div');
      aim.style.cssText = `position:absolute;top:4px;left:50%;transform:translateX(-50%);
        font-size:16px;animation:aimBounce .5s ease-in-out infinite alternate;pointer-events:none;
        z-index:5;text-shadow:0 0 8px rgba(255,80,80,.8);`;
      aim.textContent = '🎯';
      wrap.appendChild(aim);
      wrap.addEventListener('click', () => selectTarget(i));
    }
    field.appendChild(wrap);
  });
}

function selectTarget(i) {
  if(battle.turn !== 'player' || battle.over || battle.selectedCard === null) return;
  if(battle.enemyHand[i].currentHP <= 0) return;
  battle.selectedTarget = i;
  try{ Audio.sfxCardSelect(); }catch(e){}
  const pCard = battle.playerHand[battle.selectedCard];
  const tCard = battle.enemyHand[i];
  const adv = (TYPE_ADV[pCard.type]||[]).includes(tCard.type);
  const _tName=(FCLANG.cardNames||{})[tCard.id]||tCard.name;
if(adv) setLog(`${FCLANG.typeAdv||'✨ Type adv!'}\n${pCard.emoji} → ${tCard.emoji} ${_tName}`);
else    setLog(`${pCard.emoji} → ${tCard.emoji} ${_tName}`);
  // NIE renderujemy pola — DOM musi być stabilny dla fireLightning
  setTimeout(() => endTurn(), 120);
}

function selectCard(i) {
  if(battle.turn !== 'player' || battle.over) return;
  if(battle.playerHand[i]?.currentHP <= 0) return; // nie można wybrać martwej karty
  battle.selectedCard = battle.selectedCard === i ? null : i;
  battle.selectedTarget = null;
  try{ Audio.sfxCardSelect(); }catch(e){}
  renderHand();
  renderEnemyField();

  if(battle.selectedCard !== null) {
    const card = battle.playerHand[battle.selectedCard];
    setLog(`${card.emoji} ${(FCLANG.cardNames||{})[card.id]||card.name}\n${FCLANG.clickEnemy||'👆 Click enemy card!'}`);
  } else {
    setLog(FCLANG.selectCard||'\n👇 Select card');
  }
}

function endTurn() {
  if(battle.over) return;
  if(battle.turn !== 'player') return;

  // Player attacks
  if(battle.selectedCard !== null) {
    const pCard = battle.playerHand[battle.selectedCard];
    // Find alive enemy card
    const aliveEnemies = battle.enemyHand.filter(e => e.currentHP > 0);
    if(aliveEnemies.length > 0) {
      // Użyj wybranego celu lub losowego
      let targetIdx;
      if(battle.selectedTarget !== null && battle.enemyHand[battle.selectedTarget]?.currentHP > 0) {
        targetIdx = battle.selectedTarget;
      } else {
        const randEnemy = aliveEnemies[Math.floor(Math.random()*aliveEnemies.length)];
        targetIdx = battle.enemyHand.indexOf(randEnemy);
      }
      const target = battle.enemyHand[targetIdx];
      let dmg = calcDamage(pCard, target, true);
      const targetMaxHP = target.hp;
      target.currentHP = Math.max(0, target.currentHP - dmg);

      // enemyHP zmniejsza się proporcjonalnie gdy karta ginie
      if(target.currentHP <= 0) {
        battle.enemyHP = Math.max(0, battle.enemyHP - Math.ceil(targetMaxHP * 0.25));
      }

      Audio.sfxAttack();

      // 1. Piorun
      const lightColor = TYPE_LIGHTNING[pCard.type] || '#ffe060';
      const attackingCardIdx = battle.selectedCard;
      fireLightning(attackingCardIdx, targetIdx, lightColor);

      // 2. Cofnięcie karty gracza
      setTimeout(() => animatePlayerRecoil(attackingCardIdx), 80);

      // 3. Trafienie / śmierć karty wroga
      const isDying = target.currentHP <= 0;
      setTimeout(() => {
        animateEnemyHit(targetIdx, isDying);
        try{ Audio.sfxHit(); }catch(e){}
        floatDamage(dmg, true);
        setTimeout(() => renderEnemyField(), isDying ? 520 : 0);
      }, 300);

      const _pN=(FCLANG.cardNames||{})[pCard.id]||pCard.name;
const _tN2=(FCLANG.cardNames||{})[target.id]||target.name;
setLog(`${_pN} → ${_tN2}: -${dmg}${FCLANG.dmgSuffix||'!'} ${getTypeMsg(pCard.type,target.type)}`);
      updateHP();

      // Wygrana TYLKO gdy wszystkie karty przeciwnika martwe
      const allEnemiesDead = battle.enemyHand.every(e => e.currentHP <= 0);
      if(allEnemiesDead) {
        setTimeout(() => endBattle(true), 600);
        return;
      }
    }
  } else {
    setLog(FCLANG.skipTurn||'Turn skipped...');
  }

  // Enemy turn
  battle.turn = 'enemy';
  setTimeout(() => {
    enemyAttack();
  }, 800);
}

function enemyAttack() {
  if(battle.over) return;
  const aliveEnemies = battle.enemyHand.filter(e => e.currentHP > 0);

  // Jeśli wszystkie karty wroga martwe — gracz wygrał!
  if(aliveEnemies.length === 0 || battle.enemyHP <= 0) {
    endBattle(true);
    return;
  }
    const attacker    = aliveEnemies[Math.floor(Math.random()*aliveEnemies.length)];
    const attackerIdx = battle.enemyHand.indexOf(attacker);
    const alivePlayer = battle.playerHand.filter(p => p.currentHP > 0);
    let dmg, targetIdx = 0;

    if(alivePlayer.length > 0) {
      const target = alivePlayer[Math.floor(Math.random()*alivePlayer.length)];
      targetIdx = battle.playerHand.indexOf(target);
      dmg = calcDamage(attacker, target, false);
      target.currentHP = Math.max(0, target.currentHP - dmg);
      const _aName=(FCLANG.enemies||[])[Math.min(GS.battleLevel-1,(FCLANG.enemies?.length||40)-1)]||attacker.name;
setLog(`${attacker.emoji||'👾'} ${_aName}\n${FCLANG.counterattack||'💥 counter'} ${dmg}${FCLANG.dmgSuffix||'!'}`);
    } else {
      dmg = Math.ceil(attacker.atk * 0.5);
      battle.playerHP = Math.max(0, battle.playerHP - dmg);
      setLog(`${_aName}\n${FCLANG.directHit||'💥 direct hit'} ${dmg}${FCLANG.dmgSuffix||'!'}`);
    }

    // Piorun wroga — z opóźnieniem żeby DOM był w pełni wyrenderowany
    setTimeout(() => fireEnemyLightning(attackerIdx, targetIdx), 50);
    setTimeout(()=>{
      floatDamage(dmg, false);
      try{ Audio.sfxHit(); }catch(e){}
      // Animacja trafienia / śmierci karty gracza
      const playerCardDying = battle.playerHand[targetIdx]?.currentHP <= 0;
      animatePlayerCardHit(targetIdx);
      if(playerCardDying) {
        setTimeout(() => renderHand(), 400);
      }
    }, 220);
    updateHP();

    // Przegrana gdy wszystkie karty gracza martwe LUB playerHP = 0
    const allPlayerDead = battle.playerHand.every(p => p.currentHP <= 0);
    if(allPlayerDead) {
      setTimeout(()=>endBattle(false), 700);
      return;
    }

  // Opóźnij reset tury żeby animacja zdążyła się pokazać
  setTimeout(()=>{
    battle.turn = 'player';
    // Reset wybranej karty jeśli zginęła
    if(battle.selectedCard !== null &&
       battle.playerHand[battle.selectedCard]?.currentHP <= 0) {
      battle.selectedCard = null;
    }
    battle.selectedTarget = null;
    renderHand();
    renderEnemyField();
    setTimeout(()=> setLog(FCLANG.yourTurn||'\n👇 Your turn!'), 400);
  }, 800);
}

function calcDamage(attacker, defender, isPlayerAttacking) {
  const diff = FC_DIFF_CONFIG[FC_DIFF] || FC_DIFF_CONFIG.medium;
  // Na łatwym: gracz silniejszy (×1.30 atk), wróg słabszy (×0.70 atk)
  // Na trudnym: gracz słabszy (×0.70 atk), wróg silniejszy (×1.30 atk)
  let atkMod, defMod;
  if(isPlayerAttacking) {
    atkMod = 2 - diff.atkMult; // łatwy=1.30, średni=1.00, trudny=0.70
    defMod = diff.defMult;     // łatwy=1.30, średni=1.00, trudny=0.70
  } else {
    atkMod = diff.atkMult;     // łatwy=0.70, średni=1.00, trudny=1.30
    defMod = 2 - diff.defMult; // łatwy=0.70, średni=1.00, trudny=1.30
  }
  let base = Math.max(1, Math.round(attacker.atk * atkMod) - Math.floor(defender.def * defMod * 0.4));
  const adv = TYPE_ADV[attacker.type] || [];
  if(adv.includes(defender.type)) base = Math.round(base * 1.5);
  return Math.max(1, base);
}

function getTypeMsg(atkType, defType) {
  const adv = TYPE_ADV[atkType] || [];
  if(adv.includes(defType)) return FCLANG.typeAdvMsg||'✨ Type advantage!';
  return '';
}

// ── FIREWORKS ────────────────────────────────────
function launchFireworks(duration=5000) {
  const canvas = document.getElementById('fireworksCanvas');
  if(!canvas) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width  = rect.width;
  canvas.height = rect.height;
  const ctx = canvas.getContext('2d');
  const particles = [];
  const colors = ['#ff4060','#ffaa00','#40ff80','#60a0ff','#ff60ff','#ffffff','#ffe060','#40ffff'];

  function burst(x, y) {
    const color = colors[Math.floor(Math.random()*colors.length)];
    const count = 28 + Math.floor(Math.random()*16);
    for(let i=0;i<count;i++) {
      const angle = (i/count)*Math.PI*2 + Math.random()*.3;
      const speed = 2.5 + Math.random()*4;
      particles.push({
        x, y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - 1.5,
        color,
        alpha: 1,
        r: 2.5 + Math.random()*2,
        gravity: 0.08,
        trail: [],
      });
    }
  }

  // Odpal pierwszy fajerwerk od razu, potem co chwilę
  burst(canvas.width*0.3, canvas.height*0.3);
  burst(canvas.width*0.7, canvas.height*0.25);

  const interval = setInterval(()=>{
    const x = canvas.width*0.15 + Math.random()*canvas.width*0.7;
    const y = canvas.height*0.1 + Math.random()*canvas.height*0.45;
    burst(x, y);
  }, 400);

  const startTime = Date.now();

  function animate() {
    if(Date.now() - startTime > duration) {
      clearInterval(interval);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      return;
    }

    // Fade poprzedniej klatki (trail effect)
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,idx) => {
      p.trail.push({x:p.x, y:p.y});
      if(p.trail.length > 5) p.trail.shift();

      // Rysuj ślad
      p.trail.forEach((t,ti) => {
        ctx.beginPath();
        ctx.arc(t.x, t.y, p.r*(ti/p.trail.length)*0.6, 0, Math.PI*2);
        ctx.fillStyle = p.color + Math.floor(p.alpha*(ti/p.trail.length)*150).toString(16).padStart(2,'0');
        ctx.fill();
      });

      // Rysuj cząstkę
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color + Math.floor(p.alpha*255).toString(16).padStart(2,'0');
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.fill();
      ctx.shadowBlur = 0;

      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.98;
      p.alpha -= 0.016;
    });

    // Usuń martwe cząstki
    for(let i=particles.length-1;i>=0;i--) {
      if(particles[i].alpha <= 0) particles.splice(i,1);
    }

    requestAnimationFrame(animate);
  }
  animate();
}

function endBattle(won) {
  battle.over = true;
  const overlay = document.getElementById('result-overlay');
  overlay.classList.add('show');

  if(won) {
    Audio.sfxWin();
    document.getElementById('resultTitle').textContent = FCLANG.win||'⚔️ Victory!';
    document.getElementById('resultTitle').style.color = '#80ee60';
    document.getElementById('resultSub').textContent = FCLANG.winSub||'Forest is safe...';
    GS.wins++;
    GS.battleLevel = Math.min(GS.battleLevel + 1, ENEMIES.length);
    document.getElementById('resultScore').textContent = FCLANG.winScore(GS.battleLevel-1,GS.wins);
    document.getElementById('btnNext').textContent = GS.battleLevel <= ENEMIES.length ? (FCLANG.nextBattle||'▶ Next Battle') : (FCLANG.completed||'🏆 Done!');
    setTimeout(() => launchFireworks(5000), 100);
    // Sync wyniku i postępu z serwerem po wygranej
    pushScoreToServer();
    pushProgressToServer();
  } else {
    Audio.sfxLose();
    document.getElementById('resultTitle').textContent = FCLANG.lose||'💀 Defeat...';
    document.getElementById('resultTitle').style.color = '#ff6060';
    document.getElementById('resultSub').textContent = FCLANG.loseSub||'Darkness consumed the forest.';
    GS.lives = Math.max(0, GS.lives - 1);
    document.getElementById('resultScore').textContent = FCLANG.loseLives(GS.lives);
    document.getElementById('btnNext').textContent = FCLANG.retry||'↺ Try Again';

  updateMenuLives();
}

function fireLightning(fromCardIdx, toCardIdx, color) {
  const canvas = document.getElementById('lightningCanvas');
  if(!canvas) return;
  // Canvas jest fixed na viewport — rozdzielczość = rozmiar okna
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  const fromEl = document.querySelector(`#handArea .card[data-idx="${fromCardIdx}"]`);
  const toEl   = document.querySelector(`#enemyField .card[data-idx="${toCardIdx}"]`);
  if(!fromEl || !toEl) return;

  // Zatrzymaj wszystkie animacje kart przed pomiarem
  const allCards = document.querySelectorAll('#handArea .card, #enemyField .card');
  const savedAnims = [];
  allCards.forEach(c => { savedAnims.push(c.style.animation); c.style.animation = 'none'; });
  document.body.offsetHeight; // force reflow

  function cardCenter(el) {
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width/2, y: r.top + r.height/2 };
  }

  const from = cardCenter(fromEl);
  const to   = cardCenter(toEl);

  // Przywróć animacje
  allCards.forEach((c, i) => { c.style.animation = savedAnims[i]; });

  let frame = 0;
  const totalFrames = 60;

  function zigzag(x1,y1,x2,y2,chaos) {
    const pts = [[x1,y1]];
    for(let i=1;i<9;i++){
      const t=i/9;
      pts.push([
        x1+(x2-x1)*t+(Math.random()-.5)*chaos,
        y1+(y2-y1)*t+(Math.random()-.5)*chaos
      ]);
    }
    pts.push([x2,y2]);
    return pts;
  }

  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const p = frame/totalFrames;
    const alpha = p < 0.4 ? p/0.4 : 1-(p-0.4)/0.6;

    ctx.globalAlpha = alpha;

    // 3 pioruny — każdy trochę inny
    [40,24,14].forEach((chaos,i) => {
      const pts = zigzag(from.x,from.y,to.x,to.y,chaos);
      ctx.beginPath();
      ctx.moveTo(pts[0][0],pts[0][1]);
      pts.forEach(([x,y])=>ctx.lineTo(x,y));
      ctx.strokeStyle = i===0 ? '#ffffff' : color;
      ctx.lineWidth = i===0 ? 2 : 3-i*0.5;
      ctx.shadowColor = color;
      ctx.shadowBlur = 16-i*4;
      ctx.stroke();
      // Gałązka losowa
      if(i===1 && Math.random()>.4) {
        const bi = 3+Math.floor(Math.random()*4);
        ctx.beginPath();
        ctx.moveTo(pts[bi][0],pts[bi][1]);
        ctx.lineTo(pts[bi][0]+(Math.random()-.5)*36, pts[bi][1]+(Math.random()-.5)*36);
        ctx.lineWidth=1; ctx.stroke();
      }
    });

    // Iskry przy uderzeniu
    if(frame >= 8) {
      const exp = (frame-8)/8;
      ctx.shadowBlur=20;
      for(let s=0;s<6;s++){
        const ang = (s/6)*Math.PI*2;
        const len = exp*22;
        ctx.beginPath();
        ctx.moveTo(to.x,to.y);
        ctx.lineTo(to.x+Math.cos(ang)*len, to.y+Math.sin(ang)*len);
        ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(to.x,to.y,exp*16,0,Math.PI*2);
      ctx.fillStyle=color+'44'; ctx.fill();
    }

    // Blask przy źródle
    if(frame<6) {
      ctx.shadowBlur=0;
      ctx.beginPath();
      ctx.arc(from.x,from.y,12*(1-p),0,Math.PI*2);
      ctx.fillStyle=color+'33'; ctx.fill();
    }

    ctx.globalAlpha=1; ctx.shadowBlur=0;
    frame++;
    if(frame<totalFrames) requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  animate();
}
